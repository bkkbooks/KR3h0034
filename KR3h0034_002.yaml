body:
  text: 書小史卷二宋陳思撰傳一后女王漢孝成許皇后大司馬車騎將軍平恩侯嘉女也聰慧善史書後漢和帝隂皇后諱某光烈皇后兄執金吾識之曾孫也少聰慧善書藝和熹鄧皇后諱綏太傅禹之孫也六歲能史書十二通詩論語志在典籍母嘗非之曰汝不習女工以供衣服乃更務學寧當舉博士耶后重違母言晝修婦業暮誦經典家人號曰諸生昭烈梁皇后諱妠大將軍商之女也少善女工好史書九嵗能誦論語治韓詩大義略舉嘗以烈女圖畫置於左右以自監戒魏文帝甄皇后中山無極人明帝母漢太保甄邯後也九嵗喜書視字輒識數用諸兄筆硯兄謂后言汝當習女工用書為學當作女博士耶后答言聞古者賢女未有不學前世成敗以為已誡不知書何由見之吳王趙夫人丞相趙逵之妹善書畫巧妙無雙名畫記云孫權嘗歎魏蜀未平思得善畫者圖山川地形夫人乃進所寫江湖九州山嶽之勢晉武元楊皇后諱艷字瓊芝𢎞農華陰人后少聰慧善書姿質美麗嫻於女工東晉安僖王皇后諱神愛琅琊臨沂人中書令獻之女也善書梁武郗皇后諱徽髙平金鄉人父􅀈太子舍人后母宋文帝女尋陽公主也幼明慧善𨽻書讀史傳女工之事無不嫻習陳武宣章皇后諱要兒吳興烏程人少聰慧美容儀善書能誦詩及楚辭後主沈皇后諱婺華吳興武康人父君理母即武帝女會稽穆公主也后性端靜有識量聰明強記涉獵經史工書翰國亡與後主俱入長安及後主薨后自為哀辭文甚酸切書賦云沈氏后德名標婺華允光親署獨美可嘉如晚晴陳雲傍日殘霞唐則天順聖皇后武氏諱曌并州文水人也臨朝稱尊號曰大周金輪皇帝好飛白書自題升仙太子廟碑額后好書嘗墨制問石泉公王方慶求其祖父書方慶進十一代祖𨗳已下二十八人書共十卷后御武成殿示羣臣仍令中書舍人崔融為寶章集以敘其事復賜方慶當時以為榮書賦云武后君臨藻翰時欽順天矜而永保先業從人欲而不顧兼金諸女魯秋胡妻者魯人秋胡逺宦三年不歸其妻幽居懷思而作蟲書秦書有八體四曰蟲書以書幡信首蕭子良云實蠶書也蓋婦人閨閫之所事故因擬象韋續五十六種書體云蟲書魯秋胡妻因浣蠶所作亦曰雕蟲書漢安定皇甫規妻馬氏善屬文能草書時為規答書記人怪其工蔡琰字文姬即中郎雍之女也博學有才辨工書善章草適河東衛仲道夫亡無子歸寧於家興平中天下喪亂文姬為胡騎所獲沒於胡中十二年曹操素與雍善痛其無嗣乃遣使者以金璧贖之而重嫁於董祀祀為屯田都尉犯法當死文姬詣曹操請之乃原祀之罪操因問曰聞夫人家先多墳籍猶能記憶之否文姬曰昔亡父賜書四千許卷流離塗炭罔有存者今所誦憶裁四百餘篇耳操曰今當使十吏就夫人寫之文姬曰妾聞男女之别禮不親授乞給紙筆真草唯命於是繕寫送之文無遺誤今太宗皇帝所勒法帖中有文姬十四字云我生之初尚無為我生之後漢祚衰晉衛夫人名鑠字茂猗廷尉展之女弟恆之從妹汝隂太守李矩之妻也善𨽻書張懷瓘云𨽻書尤善規矩鍾公碎玉壺之氷爛瑶臺之月婉然芳樹穆若清風右軍少嘗師之子敬年五六嵗已解書神情朗悟嘗從諸兄造焉夫人乃書大雅吟賜之後右軍亦愛其書而臨寫之唐人評云衛夫人書如插花舞女低昂美容又如美女登臺仙娥弄影紅蓮映水碧沼浮霞王羲之妻郗氏鑒之女也甚工書兄愔與曇謂之女中筆仙王凝之妻謝氏字道韞安西將軍奕之女也聰識有才辨善正行書甚為舅氏所重李嗣真云雍容和雅芬馥可玩郗愔妻傅氏善正書見庾肩吾書品王洽妻苟氏善書王珉妻江氏善書宋孔琳之妻謝氏善書唐臨川公主太宗女也下嫁周道務主工籀𨽻能屬文髙宗立上孝德頌帝下詔褒答劉秦妹歸馬氏善臨學王右軍蘭亭及安西帖咄咄逼真秦翰林書人也書賦云馬家劉氏臨效逼斥安西蘭亭貌奪真迹如宓妃遺形於巧素再見如在之古昔房璘妻高氏善𨽻書嘗書太原府太谷縣令安庭堅美政頌歐公集古録有跋諸王後漢北海敬王睦靖王興之子光武兄伯升之孫也少好學博通書傳能屬文善史書當世以為楷則光武器之明帝為太子尤見親幸甚愛其法及寢疾帝馹馬令作草書尺牘十首樂成靖王黨明帝子聰慧善史書喜正文字與肅宗同年尤相親愛魏陳思王植字子建武帝子善屬文言出為論下筆成章亦工書晉齊獻王攸字大猷文帝第二子也少而岐嶷及長清和平允愛經籍能屬文善尺牘為世模楷王僧虔云晉齊王攸書京洛以為楷法張懷瓘云蘭芳玉潔竒而且古書賦云偉哉齊王手迹長留翰墨之外仁賢是優重則突兀嵩華輕則參差斗牛武陵威王晞字道叔元帝子也善正書書賦云﨣﨣道叔逺淳通俗全姓名而孰多議風度而不足元子憚其威武吾徒遵其軌躅會稽文孝王道子字道子簡文帝子少以清淡為謝安所稱善行書書賦云道子雅薄綿密纎潤露輕藏沈假曲躡峻猶尺水之含衆象小山之擬萬仞宋南平穆王鑠字休元文帝第四子少好學有文才善正書書賦云南平休元筆力自全幼齒結搆老成天然比夫鳥在􅑹龍潛泉神采卓爾文辭燦然海陵王休茂文帝第十四子也善正書書賦云休茂尚沖己恭法則長於用筆結字短於精神骨力性靈可觀運用未極猶鳬雛鵠子初備羽翼齊臨川獻王映字宣光高帝第二子也幼而警悟美言笑善騎射解聲律工左右書左右射武陵昭王􅀈字宣昭高帝第五子也髙祖雖為方伯而居處甚貧諸子學書無紙筆􅀈嘗以指畫空中及畫掌學字遂工篆法衡陽王鈞字宣禮高帝第十一子也七歲出繼衡陽王性好學善屬文工正書嘗手自書細書寫五經部為一卷置於巾箱中以備遺忘侍讀賀玠問曰殿下家自有墳索復何須蠅頭細書别藏巾箱中答曰巾箱中有五經於檢閲既易且一更手寫則永不忘諸王聞而爭效為巾箱五經巾箱五經自此始也江夏王鋒字宣頴高帝第十二子也年四歲性方整好學書畜於母張氏舍張氏無紙乃倚井欄為書書滿則洗之已復更書如此者纍月又晨興不肯拂窗塵而先畫塵上學為字書五歲高帝使學鳳尾諾一學即工高帝大悅以玉麒麟賜之曰麒麟賞鳳尾矣工書為當時藩王所推南郡王昭業亦稱工書謂武帝曰臣書固應勝江夏王武帝答闍黎第一法身第二法身昭業小名闍黎鋒小名也唐陸龜蒙説鳳尾諾或問余曰鳳尾諾為何等物圍耶書耶對曰余之所聞自晉訖于梁陳以來藩邸之書也凡封子弟為王則開府辟僚屬取當時士有學行才藻者中是選其所下書東宫則曰令上書則曰箋諸王下書則曰教上書則曰啓應和文章則曰應令應教下其制一等故也其事行則曰諾猶漢天子肯臣下之奏曰可也鳳尾則所諾箋之文也綷縩然褵褷然織與繪莫的知既肯其行必有褒異之辭若今之批答案晉元帝為琅琊王時帝美其才令通習外事常使批鳳尾諾南齊江夏王鋒髙帝第十二子甚憐之年五嵗使學鳳尾諾下筆便工帝大悅以玉麒麟賜之餘未見其出竟陵文宣王子良字雲英武帝第二子也少有清尚禮才好士善行書書賦云子良則能知未善心逺迹邇家風若遺古則翻鄙雖有力而無體將從真而自美猶土階茅茨儉德之始梁邵陵攜王綸字世調武帝第六子也少頴悟博學善屬文能書尤工尺牘𨽻書更變古法甚有趣媚書賦云世調則氣吞元常若置度內方之惠達蕭特旨趣猶昧擅時譽而徒髙考遺蹤而罕逮陳始興王伯茂字欎之文帝第二子也性聰敏好學謙恭下士世祖深愛重之時征北人於丹徒盜發晉郗曇墓大獲晉右將軍王羲之書及諸名賢事迹事覺其書並沒官藏於祕府文帝以伯茂好古多以賜之由是伯茂大工草𨽻甚得右軍法廬陵王伯仁字夀之文帝第八子官至光祿大夫中武將軍善行書武陵王伯禮字用之文帝第十子陳亡入隋為臨洮太守善行書永陽王伯智字策之文帝第十二子少敦厚有器局博涉經史善行書陳亡入隋大業中為國子司業桂陽王伯謀字深之文帝第十三子位至散騎常侍善行書書賦云髙踈壯浪復睹伯謀如策馬馳逐葦航泛浮新蔡王叔齊子子肅宣帝第十一子也風采眀贍博涉經史善屬文能正書陳亡入隋為尚書主客郎北齊彭城景思王浟字子深神武第五子也元象二年拜通直散騎常侍封長樂郡公博士韓毅教浟書見浟筆迹未工戲浟曰五郎書畫如此忽為常侍開國今日後更宜用心浟正色答曰昔甘羅為秦相未聞能書凡人惟論才具何如豈必勤勤筆迹博士當今能者何為不作三公浟時年蓋八歲矣毅甚慚唐魯哀王智雲初名稚詮髙祖子善射工書奕漢王元昌高祖第七子少好學能書畫尤長正行書諸王仲季兼有能名韓王曹王即其亞也曹則妙於飛白韓則工於草行李嗣真云漢王作獻之氣勢或如舞劍往無鄰幾書賦云漢王童年自得書意夙承羲獻守法不二韓王元嘉高祖第十一子少好學聚書至萬卷又採碑文古迹多得異本參定同異尤善書畫魯王靈夔高祖第十九子篤學善草𨽻通音律曹王明太宗之子特善飛白不減其父岐王隆範􅌖宗子追册惠文太子範好學工書愛儒士無貴賤為盡禮又聚書畫皆世所珍者初隋亡禁內圖書湮沒唐興募訪稍稍復出藏於祕府長安初張易之奏令善工整治乃密使摹肖殆不可辨竊其真本藏於家既誅悉為薛稷取去稷又敗範得之初不聞奏後慮焉乃盡焚之書賦云惠文靡惓博學敦勸恨夫有始無終灰燼成空苟懼存而投閣徒榮歿而升宫尚可謂梁園筆壯樂府文雄纍聖重光之盛業六書一藝之精工書小史卷二
