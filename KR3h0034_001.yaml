body:
  text: 書小史卷一宋陳思撰紀太昊伏犧氏燧人氏之子也因風而生故為風姓以木王天下始畫八卦造書契代結繩因獲景龍之瑞其制儀象布政令紀官皆以龍於是始為龍書唐韓晉公滉嘗獲齊竟陵王子良龍書千五字置於招隱寺乃其遺法炎帝神農氏薑姓以火德王始為耒耜以教民稼穡作陶冶斧斤民用以利嘗百草以濟民病因上黨羊頭山始生嘉禾八穗帝異之乃作穗書用頒政令黃帝少典之子姓公孫名軒轅號有熊氏命倉頡沮誦造書字以正名百物由是古文滋生是時景雲常見郁郁紛紛帝因為雲書以紀職又嘗逰元扈之上靈龜負圖而臻文章之繁充自此始帝嘉其感應作書以寫其狀後世有龜書焉少昊金天氏名摰字青陽黃帝之子也姬姓少昊之立鳳鳥適至故以鳥紀官作鸞鳳書其文章衣服皆以為象顓頊高陽氏黃帝之孫昌意之子也靜淵以有謀疏通而知事作科斗書因科斗之名故飾之以形頭粗尾細腹狀團圓如水中之科斗魯恭王時壞孔子宅於壁中得所藏書皆科斗文字令古文是也帝嚳高辛氏黃帝之曾孫也生而神靈自言其名日月所照風雨所至莫不從服以人事紀官象仙人形書其車器衣服皆為之後代因之遂作此體帝堯陶唐氏名放勳姓伊耆帝嚳之子也因軒轅靈龜負圖遂作龜書象龜之形焉帝禹夏后氏名文命姒姓黃帝元孫顓頊之孫鯀之子也舜授禹以位於是大朝天下諸侯因九牧貢金鑄鼎象物故作鐘鼎書象鐘鼎形象周武王名發姬姓帝嚳之後文王之子也率修文王緒業時殷紂無道武王東觀兵至於盟津渡河中流白魚躍八王舟中武王俯取以祭凡厥符瑞史臣曰佚紀之文字作為魚書體魚之首骨為乙尾翼為丙蓋是則焉初文王時赤雀銜書集户至武王又感丹烏流室以此二瑞故作鳥書勢若翔羽穆王名滿昭王之子時西域化人來王與之遊而得八駿之乘乃西遊見王母於瑤池之上樂而忘返聞徐偃王得諸侯遂長驅而歸後登趙州贊皇山大篆吉日癸巳四字於山漠孝武皇帝姓劉氏諱徹景帝中子也能文辭詩賦初六國時各以異體之書僭為符信而芝草芝英等書興焉秦焚儒典其文煨燼至帝産靈芝於宣房既作芝房之歌因述芝英之書焉孝元皇帝名奭宣帝太子也好儒多材藝善史書史書周宣王太史籀所作大也十五篇教學童之書洞曉音律窮極要妙後漢肅宗孝章皇帝諱烜顯宗第五子也少寬容好儒術初史遊作草書惟君長告令臣下用之建初中杜度善草帝貴其迹詔上章表令作草體始號章草今法帖中有章帝草書辰宿列張等數十字存焉恭宗孝安皇帝諱祐肅宗孫也年十歲好學史書和帝常稱之孝靈皇帝諱宏肅宗元孫也帝好學善書自作皇羲篇五十章始置鴻都門學生敕州郡王公舉召能為尺牘辭賦及工書鳥者相課試至千人熹平中詔諸儒正五經文字命蔡雍等書刻石立於太學魏太祖武皇帝姓曹氏諱操字孟德沛國譙人也多材藝自作兵書十餘萬言尤工章草雄逸絶倫張華云漢世安平崔瑗崔瑗子實𢎞農張芝芝弟昶善草書而武帝亞焉文皇帝諱丕字子桓武帝太子也善飛白書時於宫中戲為之高貴鄉公諱髦字彥士文帝孫東海定王霖子也少好學夙成工草𨽻吳大帝姓孫諱權字仲謀吳郡富春人性度宏朗仁而多智善行草書南齊王僧虔常得大帝及景帝歸命侯法書上之齊高帝後主諱皓字元宗大帝權之孫太子和之子也善行𨽻書梁庾肩吾云魏武筆墨雄贍孫皓體裁綿密李嗣真云孫皓吳人酣暢驕其家室雖欲矜豪亦復平矣晉景皇帝姓司馬氏諱師字子元河內溫縣人宣帝長子也沈毅有大略少流美譽善正書文皇帝諱昭字子上景帝之母弟也善正書書賦云挹子元之瓌迹高子上之雄神量藴文儒才苞古真或寄詞達禮任道懷仁或仰則鍾繇平視衛臻如晴郊駟馬維嶽降神武皇帝諱炎字安世文帝長子也寬惠仁厚深沈有度量善行草書東晉元皇帝名睿字景文宣帝曾孫琅琊恭王覲之子東朝中興之主也沈敏有度量善正行書當東遷謠曰五馬浮渡江一馬化為龍書賦云逮乎龍化東遷景文興嗣天然俊傑毫翰英異元帝之用筆可觀世踰劉超之呈規仰似如發硎刃虎駿鶚眙懦夫喪精劍客得志明皇帝諱紹字道幾元帝長子也幼而聰哲有對日之竒雅好文詞善書畫成皇帝諱衍字世根明帝長子也少聰敏及長留心萬幾務在簡儉善草書書賦云成帝則生知草意頴悟通諳光使畏魄青疑過藍徑力外爽古風內含若雲開而乍睹晴日泉湧而懸歸碧潭康皇帝諱嶽字世同成帝母弟也善行草書書賦云康帝則幼少間慢逈出凡境駟馬安車不尚馳騁哀皇帝諱丕字千齡成帝長子也善行書簡文皇帝諱昱字道萬元帝少子也幼而岐嶷為元帝所愛及長尤愛玄言留心典籍工行草書孝武皇帝諱曜字昌明簡文帝第三子也善行草書書賦云真率孝武不規不矩氣有餘高體無所主若露滋蔓草風送驟雨宋高祖武皇帝姓劉氏諱裕字德輿彭城人性嚴整有法度帝素拙於書劉穆之曰此雖小事然宣被四逺願公少復留意帝既不能措意又稟分有在穆之乃曰公但縱筆為大字一字徑尺亦無嫌大既足有所包且其勢亦美武帝從之一紙不過六七字便滿書賦云宋武德輿法含古初見答道和之啓未披有位之書觀其逸毫巨麗載兆虎變高躅莫究其涯雄風於焉已扇猶金玉礦璞包露貴賤文皇帝諱義隆武帝第三子也聰明仁厚雅重文儒博涉經史善隸書及行草張懷瓘云規模大令自謂不減於師時論以為天然勝羊欣而功夫恨少是亦可尚道心雖微探索幽深若泠泠水行有巖石間真聲爾李嗣真云放逸屈摺頗效康昕量其直置孤梗是謝靈運之流書賦云皇矣文帝天知正𨽻舉已達於縱橫攀王媚於緊細向專精而習熟幾可與之興替尚瞻擊水之鵬摶且並聞天之鶴唳孝武皇帝諱駿字休龍文帝第三子也少機頴讀書七行俱下才藻甚美善正行草書書賦云孝武則武威戡難翰墨馳聲雖稟訓而已高恨一簣而未成徒忌人之賢已冀及父之令名與思話而雄強追彥琳而愧恥若夷狄之佳麗慕容顔於桃李明皇帝諱彧字休景文帝第十一子也善行書書賦云太宗徽音用壯之心遺棄鄙野不無高深快突俗工匠古鄰今冠柤梨之下果怯鸞鳳之珍禽齊太祖高皇帝姓蕭氏諱道成字紹伯南蘭陵人姿表英異龍顙鐘聲鱗文遍體敦朴尚古善屬文工真行草書篤好不已祖述子敬稍乏筋骨與王僧虔賭書畢帝曰誰為第一僧虔對曰臣書臣中第一陛下書帝中第一帝笑曰卿可謂善自謀矣張懷瓘云高帝與簡穆賭書亦猶驅雞之搏貍稍不自量也書賦云齊高則文武英威時來運歸挺生紹伯墨妙翰飛觀乎吐納僧虔擠排子敬昂藏鬱拔勝草負正猶力稽牛刀水展龍性世祖武皇帝諱賾字宣述高帝長子也剛毅有斷工行草書帝欲擅書名故王僧虔不敢顯其迹嘗用拙筆書以此見容書賦云世祖宣逺象賢豈敢仰英規而無功超筆力而有膽莫顧程式率由胸襟能騁逸氣未忘童心若橫波束薪泛濫淺深廢帝鬱林王名昭業字元尚文惠太子長子也美容止好隸書武帝特所鍾愛敕皇孫手書不得妄出以貴之嘗謂武帝曰臣書固應勝江夏王帝答曰闍黎第一法身第二法身昭業小名闍黎江夏王鋒小名也梁高祖武皇帝姓蕭氏名衍字叔達南蘭陵人也性嚴整勤學博文好草書張懷瓘云狀貌雖古但乏於筋骨無竒姿異態稍減於齊高矣帝尤好圖書搜訪天下大有所獲書賦云梁則高祖叔達恢宏厥躬泯規矩合童蒙文勝質而辭寡明察衆而理窮猶巧匠琢玉心愜雕蟲太宗簡文皇帝諱綱字世讃武帝第三子也幼聰睿六歲能屬文及長氣宇寬宏讀書十行俱下博綜羣言善談玄理工行書書賦云簡文慕鍾不瑕有害慠景喬而含古蕭子雲肩邵陵而去泰邵陵王綸侯景將亂帝數夢秦王焚天下書既而內府書畫數百函後果煨滅於侯景世祖孝元皇帝諱繹字世誠武帝第七子也聰悟俊朗天才英發博極羣書工書善畫嘗自圖宣尼像為之贊而書之時人謂之三絶嘗權衡蕭子雲書比二王則若牡雞仰於威鳳子貢賢於仲尼書賦云孝元不拘快利睢盱習寬踈於一體加緊薄而小殊名畫記云承聖末魏師襲荆州城陷帝將降聚其古畫法書及典籍十四萬卷遣後閣舍人高善寶焚之帝欲投火俱焚宫嬪牽衣得免吳越寶劍並將斫柱令折乃嘆曰蕭世誠一至此乎文武之道今夜窮矣周將于瑾於煨燼中捃拾遺逸得書畫四千餘卷歸於長安陳高祖武皇帝姓陳氏諱霸先字興國吳興長城人也少倜儻有大志及長涉獵史籍善行草書書賦云爰及陳氏霸先創業盤桓有威牢落無法等王師憑怒挫衄攻劫文皇帝諱蒨字子華始興昭烈王之長子也少沉敏有識量美容儀留意經史善行草書後主諱叔寶字元秀宣帝長子也善行草書陳室富有書畫隋文帝即位以晉王廣為元帥平之命元帥記室參軍裴矩高熲收其書畫得八百餘卷於東京觀文殿起二臺東曰妙楷藏自古法書西曰寶躅收自古名畫隋煬皇帝姓楊氏諱廣高祖第二子也少敏慧好學善屬文好飛白書大業記云煬帝將幸江都宫女半不隨駕爭泣留帝言遼東小國不足煩大駕願擇將征之攀車惜留指血染鞅帝意不回因飛白題二十字賜宫嬪曰我夢江都好征遼亦偶然但留顔色在離别只今年二王書録曰大業末帝幸江都祕府圖書多將從行中道船沒大半淪棄其間得存所餘無幾弒逆之後並歸宇文化及至聊城為竇建德所破並皆亡失唐高祖神堯大聖大光孝皇帝姓李氏諱淵字叔德隴西成紀人也性寬仁善書師王褒得其妙故有梁朝風格尤善行草工而且疾結字不拘常體而筆迹韻美可愛常一日注授千許人吏案遇得好紙筆筆若飛食頃而訖得官人等並不取告符乞寶神筆之迹遂各分所授官而去書賦云我巨唐之膺休一六合而闡幽武功定文德修高祖運龍爪陳睿謀自我雄其神貌冠梁代之徽猷太宗文武大聖大廣孝皇帝諱世民高祖次子也聰明英武有大志兼資文武博通羣書善屬文工𨽻書飛白行草得二王法尤善臨古帖殆於逼真貞觀初鋭意臨玩右軍真迹人間購募殆盡嘗自書真草屏風以示羣下為一時之絶𨽻書師虞世南嘗患於戈法一日書遇戩字空其落於世南因取筆填之俄而魏鄭公奏事帝出書示之曰朕近學虞世南似盡其法卿看之鄭公曰天筆所臨萬象不能逃其形非小臣所可擬倫今仰窺聖作惟戩字戈法頗逼其真既而舞蹈慶謝上深歎鄭公髙其藻識然益加工焉太宗嘗宴三品已上於玄武門帝操筆作飛白書賜羣臣或乘酒爭取於帝手唯常侍劉泊登御座引手得之御史請劾罪以死帝曰昔聞媫好辭輦今見常侍登牀竟釋其罪髙宗天皇大聖大宏孝皇帝諱治字為善太宗第九子也善正書飛白龍朔中上自為書與遼東諸將謂許敬宗曰許圉師嘗自愛書可於朝堂開示圉師見甚驚喜私謂從官曰圉師見古迹多矣晉魏已後惟稱二王然逸少多力而醜子敬妍而少力今觀聖迹兼絶二王鳳翥鸞回實古今書聖帝嘗飛白書賜宰臣人各六字戴至德曰泛洪源俟舟楫郝處俊曰飛九霄假六翮李敬元曰資啓沃罄丹誠崔知悌曰竭忠節贊皇猷皆見意於辭中宗孝和大聖大昭孝皇帝諱顯髙宗第七子也善飛白書嘗寫升中述志碑額今見存焉睿宗元貞大聖大興孝皇帝諱且髙宗第八子也性淳和長而溫恭好學通詁訓工草𨽻書中宗嘗為武后追福修聖善寺制度竒麗為都城之最寺內立碑中宗製文睿宗書之書賦云睿宗垂文規模尚古飛五雲而在天運三光以窺户玄宗至道大聖大明孝皇帝諱隆基睿宗第三子也孝友慈仁善騎射通音律歷象之學好圗畫工八分章草豐茂英特初張説為麗正殿學士獻詩明皇自於綵箋上八分書讚曰德重和鼎功逾濟川詞林秀發翰苑光鮮開元中御注御書道德經詔列郡咸建石臺譙郡太守趙冬曦請置聖祖降生之地書賦云開元應乾神武聰明風骨巨麗碑版峥嶸思如泉而吐鳳筆為海而吞鯨順宗至德宏道大聖大安孝皇帝諱誦德宗長子也寬仁喜學藝善𨽻書德宗工為詩每賜大臣方鎮詩制必命寫之書小史卷一
