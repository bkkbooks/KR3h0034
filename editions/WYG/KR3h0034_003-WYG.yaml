body:
  text: 書小史卷三明陳思撰傳三三代秦漢倉頡黄帝時史官也首有四目通於神明仰視奎星圜曲之勢俯察龜文鳥迹之象愽採衆美合而為字是曰古文孝經援神契曰奎主文章倉頡放象是也皇甫謐曰黄帝史倉頡造文字記言行策藏之名曰書契仙人務光湯之師也湯以天下讓務光辭往清泠之陂植薤而食清風時至見其積葉交偃象而為倒薤篆以寫紫經三卷王愔文字志云垂支濃直若薤葉也或云出扶風曹喜周史佚文王時太史也尤善為竒字文王之時周家忠厚仁及草木有虎不害名曰騶虞白質元章馴於靈囿騶虞義獸也不踐生草仁之至也於是佚軌則前皇錯綜而為虎書史籕周宣王時為史官善書師模倉頡古文始籕以為聖迹湮滅失其真本今所傳者纔髣髴而已故損益而廣之或同或異謂之為篆者𫝊也𫝊其物理施之無窮亦曰史書加之銛利鉤殺自然機發信為質文之權輿非至精孰與于此今妙迹雖絶於世考其遺法肅若神明又作籕文其狀雅正體則石鼓文存焉允所謂楷𨽻曽高字書淵藪故使小學者漁獵其中矣書賦云籕之狀也若生動而神憑通自然而無涯逺則虹紳結落邇則瓊樹離披孔子陬人字仲尼魯襄公二十二年生六經之文皆孔子手書遭秦焚燼後世不復見至漢魯共王壊孔子舊宅得古文論語皆科斗文字葢孔子門人所録也今𫝊於世者惟比干墓銅盤吳延陵季子墓碑存焉碑凡十字與古文字異而迹類大篆唐開元中明皇以延陵碑字湮泐敕翰林書人殷仲容脩正厥迹由是世得𫝊之大厯四年潤州牧蕭定得其摹本以江左張從申善書因命勒石并書文記復立丹陽縣季子廟司馬子韋宋太史也景公時熒惑失度公懼脩徳熒惑退舎於是子韋作轉宿書象蓮花未開形秦李斯楚上蔡人少從荀卿學帝王術西入秦為丞相呂不韋舍人不韋賢之任為郎因得説秦王王説之聴用其計竟并天下位至丞相斯妙始省改之以為小著倉頡七篇畫如鐵石字若飛動作楷𨽻之祖為不易之法其銘題鐘鼎及作符印至今用焉今㤗山嶧山秦望山等碑皆斯遺迹斯雖草創遂造其極矣書賦云斯之法也馳妙思而變古立後學之宗祖如殘雪滴溜映朱檻而垂氷蔓木含芳貫緑林以直繩趙高仕秦為中軍府令善史書教始皇少子胡亥書及獄律法令取史籕大篆或頗省改為小篆作爰厯篇六章立於太學胡母敬本櫟陽獄吏為太史令博識古今文字亦與程邈李斯省改大篆著博學篇七章並能覃思舊章稽合衆訓程邈字元岑下邽人始為衙縣獄吏得罪始皇幽繫雲陽獄中覃思十年變大篆益小篆方圓而為𨽻書三千字奏上始皇善之出為御史衛恒曰秦既用篆奏事繁多篆字難成即令𨽻人佐書故曰𨽻書漢因行之甄鄷定六書四曰佐書是也秦造𨽻書以赴急速惟官司刑獄用之餘尚用篆焉羽人王次仲上谷人少有異志小年入學屢有靈竒年未弱冠變倉頡書為今𨽻書始皇時官務繁多得次仲文簡略赴急速之用甚喜遣使命召之三徴不至始皇大怒制檻車送之於道化為大鳥出在檻外翻然長引至於西山落二翮于山上今為大翮小翮山山上立祠水旱祈焉漢蕭何沛人善籕篆何作未央宫制度宏壯覃思三月以題其額觀者如流何便禿筆書時謂之蕭籕焉八體有署書亦何所定題蒼龍白虎二闕司馬相如字長卿成都人善詞賦工筆札辨六律測尋二氣文帝時令長卿采日辰之禽屈伸其體升降其勢象四時之氣為氣候時書王融云後漢東陽公徐安于搜諸史籍得十二時書皆像神形也董仲舒廣川人武帝時言灾異作草藁未上顔師古曰所作起草為藁也主父偃竊而奏之嚴延年字次卿東海下邳人官至河南太守雅工史書規模於趙高時稱其妙史㳺元帝時官至黄門令善草書王愔云漢元帝時史游作急就章解散𨽻體麤書之漢俗簡堕漸以行之是也此乃存字之梗槩損𨽻之規矩縱任奔逸赴速急就因草創之義謂之草書唯君長告令用之臣下則不許即今章草書也王尊字子贛音貢涿郡高陽人官至東郡太守竊學問能史書即籕書竒字也張敞字子高河東平陽人官至京兆尹善古文𫝊之子吉吉𫝊其出杜鄴鄴𫝊子林吉子竦字伯松王莽時至郡守封侯博學文雅過於子高自三代以來古文之學盖絶子高精勤習之其後有杜林衛宏為之嗣焉陳遵字孟公京兆杜陵人哀帝時為河南太守善𨽻書與人尺牘主皆藏之以為榮杜鄴字子夏魏郡繁陽人官至凉州刺史少孤其母張敞女鄴壯從敞子吉學問得其家書初鄴從張吉學吉子竦又㓜孤從鄴學問亦著於世尤長小學顔師古曰小學謂文字之學也周禮八歳入小學保氏教國子以六書故因名云李長成帝時為將作大匠善古文作元尚篇皆倉頡中正字揚雄字子雲成都人雄博學多識竒字劉芬侯芭皆從學雄以為史篇莫善於倉頡作訓纂始李斯作倉頡篇趙高作爰厯篇胡母敬作博學篇漢興閭里書師合之揔謂之倉頡篇斷六十字為一章凡五十五章至平帝元始中召天下通小學者以百數各令記字于未央庭中雄取其有用者作倉頡訓纂篇三十四章以續倉頡重復之字天鳳五年卒爰禮沛人善古文孝平時召禮等百餘人説文字於未央庭中以禮為小學元士後漢杜林字伯山扶風茂陵人凉州刺史鄴之子歴位大司空有雅材尤工古文過於鄴也故世言小學由杜公嘗於西河得漆書古文尚書一卷寶玩無已每困阨自以為不能濟于亂世嘗抱經歎曰古文之學將絶於此初衛宏長於古學方造林未見則闇然而伏及㑹面林以漆書示宏曰常以此道將絶於此何意東海衛君復能𫝊之是道不墜于地矣光武建武中卒衛宏字敬仲東海人官至給事中脩古學善屬文作尚書訓􅃌師於杜林後之學古文者皆祖于杜林衛宏也曹喜字仲則扶風平陵人工篆𨽻明帝建初中為秘書郎善草懸針垂露之法後世行之衛恒云曹喜善篆小異於李斯邯鄲淳師焉略究其妙韋誕師淳而不及也班固字孟堅扶風安陵人官至中郎將九歲能屬文好古工篆李斯曹喜之法悉能究之昔李斯作倉頡篇趙高作爰厯篇胡母敬作博學篇漢興閭里書師合之揔謂倉頡篇斷六十字為一章凡五十五章至平帝元始中徴天下通小學者於未央庭中揚雄取其有用者作訓纂篇三十四章以訓纂續倉頡也孟堅乃復續十三章至和帝永初中賈魴又撰異字取孟堅所續而廣之為三十四章用訓纂之末字以為篇目故曰滂喜篇言滂沲太盛也凡一百二十三章文字備矣賈逵字景伯扶風平陵人善書明帝時為郎與班固並校秘書撰諸經解學者宗之杜度字伯度京兆杜陵人章帝時為齊相善章草雖史游始作草書傳不紀其能又光武朝劉睦善草書史皆絶其迹創其神妙其惟杜公韋誕云杜氏傑有骨力而書字㣲痩若霜林無葉瀑水迸飛崔氏法之書體甚濃結字工巧時有不及張芝喜而學焉轉精其巧可謂草聖超前絶後獨步無雙張芝自謂上比崔杜不足下方羅趙有餘蕭子良云伯度本名操為魏武帝諱為度庾肩吾云杜度濫觴于草書書賦云草分章體肇起伯度時君重而立名自我行而作故製波循利創質畜怒賈魴善𨽻書撰滂喜篇以倉頡為上篇訓纂為中篇滂喜為下篇故謂之三倉説文曰魴以三倉之書皆為𨽻字𨽻字始廣而篆籕轉微矣徐幹字伯張扶風平陵人官至班超軍司馬邉境稱為名將善章草書班固與超書稱之曰因得伯張書藁筆勢殊工知識讀之莫不歎息實亦藝由己立名自人成者也後有蘇班亦平陵人五歲能書甚為伯張稱歎許慎字叔重汝南召陵人官至太尉南閣祭酒少好古學師於賈逵喜正文字尤善小篆規模李斯甚得其妙作説文解字十四篇萬五百餘字慎後疾篤令子冲詣闕上之安帝末卒崔瑗字子玉安平人官至濟北相文章葢世善小篆章草師於杜度媚趣過之㸃畫精微神變無礙利金百鍊美玉天姿可謂氷寒於水袁昻云崔瑗書如危峰阻石孤松一枝王隠謂之草賢庾肩吾云崔瑗擅名北中迹罕南度世有得其摹本者王子敬見之稱美以為張伯英極似之然伯英祖述于崔其骨力精熟則過也其遺迹絶少小篆則有張平子碑存焉瑗以順帝漢安二年卒崔實字子真瑗之子也博學有俊才桓帝時官至五原太守常與諸博士正定五經子真母劉氏博通墳籍動見儀則非惟實天性才敏亦由訓𨗳之功其草雅有父風張茂先甚稱之羅暉字叔景京兆杜陵人少脩名節為功曹㑹計吏轉羽林監善草書著聞三輔張伯英與同郡太僕朱賜書云上比崔杜不足下方羅趙有餘賜亦杜陵人時稱工書趙襲字元嗣京兆長安人官至燉煌太守與羅暉並以能草見重關西矜巧自與衆頗惑之張伯英素相友善靈帝時卒劉徳昇字君嗣潁川人桓靈之時以造行書擅名雖以草創亦豐贍妍美風流婉約獨步當時胡昭鍾繇並師其法世謂鍾善行押書是也而胡書體肥鍾書體瘦並各有徳昇之美也蔡邕字伯喈陳留圉人官至左中郎將封髙陽鄉侯博學好著述能畫工書創造飛白妙有絶倫尤得八分之精微體法百變窮靈盡妙獨步古今篆𨽻絶世中歲之積筆力未精及其暮年方窮其妙動合神功建寧中校書東觀奏求正定六經文字靈帝許之邕乃自書丹於碑使工鑴刻立於太學門外於是後儒晩學咸取正焉梁武帝云蔡邕書骨氣洞達爽爽如有神力書賦云伯喈三體八分二篆棨㦸彎􅋃星流電轉纎逾植髪峻極層巘師宜官南陽人靈帝好書徴天下工書於鴻都門至數百人八分稱宜官為最大則一字徑丈小字方寸千言甚矜其能而性嗜酒或時至酒家因書其壁以售之觀者雲集沽酒多售則鏟滅之宜官後為袁術將今鉅鹿宋子有耿球碑是術所立宜官書也張芝字伯英燉煌酒泉人㓜而高操博學好古經明行修朝廷以有道徴不就故時稱張有道性嗜書凡家之衣帛皆書而後練張懐瓘云章草師于杜度崔瑗龍驤豹變青出于藍又創為今草天縱尤異率意超曠若清澗長源流而無限縈迴岸谷任于造化至于交龍駭獸奔騰拏攫之勢心手隨變􅆼𡨕不知其所以然也精熟神妙冠絶古今韋仲將謂之草聖豈徒言哉伯英嘗自云上比崔杜不足下方羅趙有餘誠則尊師之辭其心肺間語也又善𨽻書以獻帝初平中卒李嗣真云伯英章草似春虹飲澗落霞浮浦又如渥霧沾濡繁霜摇落張昶字文舒伯英季弟也為黄門侍郎善八分𨽻書章草家風不墜奕葉清華書類伯英時人謂之亞聖雖筋骨不及而妍華過之八分碑今在華隂建安十一年卒李嗣真云文舒西嶽碑文但覺妍冶殊無骨氣毛宏字文雅河南陽武人工書服膺梁鵠研精八分成一家法獻帝時為郎中教於秘書八分皆𫝊宏法以建安末卒左伯字子邕東萊人特工八分名與毛宏等列小異於邯鄲淳亦擅名漢末又能作紙漢興用紙代簡至和帝時蔡倫工為之而子邕尤得其妙故蕭子良答王僧虔書云子邕之紙妍妙輝光仲將之墨一㸃如漆伯英之筆窮神盡思妙物逺矣邈不可追然子邕之八分亦猶恒山之文皮即東北之美者也張超字子並河間鄚人留侯之後有文才官至别部司馬工章草擅名一時字勢甚峻吳人以皇象方之范􅁮云超之草書妙絶時人史筆稱載遂得宣聲後葉庾肩吾云子並崔家州里頗相倣傚可謂醬醎於鹽氷寒於水姜詡梁宣田彦和皆伯英弟子並善草書孫敬字文寶家貧好學少時嘗畫地學書遂工篆𨽻傳奕善𨽻札家貧傭書後有金帛洛陽咸稱善書而得富也唐綜魯人當漢魏之交夢蛇繞身寤而狀之而為蛇書書小史卷三
