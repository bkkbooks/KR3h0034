body:
  text: 書小史卷五宋陳思撰傳四晉東晉王導字茂宏瑯琊臨沂人官至丞相諡曰文獻公少有風鑒識量清逺善草􅈻元明二帝並工書者推奬於茂宏王僧䖍云導書甚有楷法師學鍾衞好愛無厭喪亂狼狽猶懐鍾尚書宣示帖衣帶過江後在右軍處借王敬仁敬仁死其母見脩平生所愛遂以入棺王愔云王導行草見重當世書賦云業盛瑯琊茂宏厥初衆能之一乃草其書將以潤色前範遺芳後車風稜載蓄髙利有餘類賈勇之武士等相驚之戲魚王恬字敬豫𨗳之子官至後將軍㑹稽内史性簡傲多技藝奕棊為中興第一草􅈻當時無與為比尤長於臨傚率性而運則復非工時有張翼善􅈻書尤善仿傚而劣於敬豫也王洽字敬和恬之弟官至中書令理識明敏書兼諸法於草尤工落簡揮毫有郢匠成風之勢雖卓然孤秀未至運用無方從兄右軍云弟書遂不减吾飾之過也王僧䖍云洽與右軍書俱變古形不爾至今猶法鍾張王劭字敬倫洽之弟官至車騎將軍善草書王薈字敬文𨗳幼子官至散騎常侍善行書王廙字世將瑯琊臨沂人官至平南將軍荆州刺史工草􅈻飛白祖述張衞遺法亦好索靖之風嘗得索七月二十六日書一紙毎寶玩之遭喪亂乃四疊綴於衣中以過江王僧䖍云王平南廙是右軍叔自過江東右軍之前惟廙為最畫為晉明帝師書為右軍法其飛白志氣極古垂鵰鶚之翅羽類旌旗之卷舒時人云王廙飛白右軍之亞也劉超字世踰瑯琊臨邑人官至衞尉零陵忠侯善正書超筆蹟與元帝相類自職居近宻遂絶其與外交書書賦云體大法殊實推世踰禀天然而自强亂帝札而見拘猶朝廷宿舊年徳相趨陶侃字士衡秣陵人官至侍中大將軍事元明二帝性聰敏善正書逺近書疏莫不手答筆翰如流書賦云雍容士衡季孟公旅肌骨閒媚精神慢舉如辭山登朝混迹雜處顧榮字彦先呉郡人官至驃騎將軍善草書書賦云彦先尚質無而不有猶崆峒之上世俗誰偶紀瞻字思逺丹陽秣陵人官至車騎將軍好讀書手自抄寫妙觧音律善行書卞壼字望之濟隂寃句人官至侍中驃騎大將軍善草書書賦云望之之草𦂳古而老落紙筋槃分行羽抱如充仞多士交速雜寶應詹字思逺汝南南頓人官至鎮南大將軍㓜孝以學藝文章稱善草書書賦云思逺則藁草懸觧筆墨無在真率天然忘情罕逮猶羣雀之飛廣厦小魚之戲大海熊逺字孝文豫章人官至大將軍長史善正書書賦云孝文剛斷謹正援毫古雖拙利今稱且高如貴胄之躍駿武賁之操刀郄鑒字道徽髙平金鄉人官至太宰草書卓絶古而且勁書賦云道徽之豐茂宏麗下筆而剛决不滯揮翰墨而厚寔深沉等漁父之乗流鼓枻郄愔字方回鑒之子官至司空善衆書張懐瓘云雖齊名庾翼不可同年其法遵於衞氏尤長於章法濃纎得衷意態無窮筋骨亦贍若鴻鵠奮六翮飄然逰乎太虚王僧䖍云郄愔章草亞於右軍梁武帝云郄愔書得意甚熟而取妙特難踈散風氣一無雅素郄曇字重煕愔之弟官至北中郎將善草書書賦云宻壯竒姿撫蹟重煕若投石㧞距怒目揚眉郄超字景興愔之子官至中書郎臨海太守善行草書王僧䖍云郄超草書亞於二王𦂳媚過於其父骨力不及也書賦云景興當年曷云世乏正草輕利脫略古法郄儉之字處約曇之子官至太子率更令善草書郄恢字道允儉之之弟官至鎮軍將軍善正行書書賦云處約道允家之後俊狂草勢而兄優謹正書而弟潤俱始登於學次慙一􅉛於九仭庾亮字元規潁川鄢陵人明穆皇后之兄官至太尉美姿容善談論工行草書王僧䖍云庾亮書亦能入録庾懌字叔豫亮之弟官至衛尉將軍善正行書書賦云遺古效鍾叔豫髙蹤雖稳宻而傷浮淺猶葉公之愛畫龍庾氷字季堅亮之弟官至中書監以雅素垂風兄亮常以為庾氏之寶善書庾翼字稚恭明穆皇后之弟官至車騎將軍荆州刺史善草􅈻章草少與羲之齊名殊為世重兄亮亦有書名曾就右軍求書逸少荅云稚恭在彼豈復假此王僧䖍云庾翼書少時與右軍齊名右軍後進内外宗尚翼猶不忿在荆州與都下書云小兒輩乃賤家雞而愛野雉皆學逸少書湏吾還當比之右軍嘗以章草答亮亮以示翼翼乃大服因與右軍書云吾昔有伯英章草十紙因喪亂遺失嘗歎妙迹永絶今見足下答家兄書煥若神明頓還舊觀書賦云積薪之美更覽稚恭名齊逸少墨妙所宗善草則鷹摶隼擊工正則劔鍔刀鋒愧時譽之未盡覺知音而罕逢庾准字彦祖亮之孫官至豫州刺史西中郎將善草書書賦云荒蕪快利彦祖為容似較狡兔於大野任平陂之所從范汪字元平順陽人官至安北將軍贈散騎常侍善正書有謝􅆶啓傳於世書賦云順陽筆精吾見元平近瞻元常鍾繇俯視國明張澄利且掩薄能多似生如班翰之運斧之棟梁以經營范寗字武子汪之子官至中書侍郎善正書書賦云武子正筆頗全古質去凡忘情任樸不失猶髙人之與釋子志由道而秉律劉惔字真長沛郡人官至丹陽尹善行草書書賦云真長則草含稚恭庾翼之厚爽正邇越石劉琨之覊束輕浮森峭穠媚藻縟落衆木於秋杪狎羣鷗於水曲孔偘字敬思㑹稽人官至大司農善行書孔愉字敬康㑹稽人官至車騎將軍善草書書賦云敬思敬康二孔殊芳思行則輕利峭峻類驚虬逸駿康草則古質欝紆如落翮摧枯丁潭字世康㑹稽人官至散騎常侍善正草書書賦云若夫返古不忘吾推世康似無逸少如禀元常猶落太階之蓂莢掇祕府之芸芳孔廞字季舒㑹稽人官至光禄大夫工書書賦云季舒纎勁循古有禮遇稀難評唯署一啓謝尚字仁祖陳郡陽夏人官至散騎常侍博綜衆藝善草書書賦云謝氏三昆尚草特峻猶注飛㵎之瀑溜投全牛之虚刅謝安字安石尚之從弟位至太傅和粹通敏姿容溫雅人皆比之王𨗳謂文雅過之學草正於右軍右軍云卿是觧書者然知觧書為難張懐瓘云安石尤善行書亦猶衞洗馬風流名士海内所瞻王僧䖍云謝安亦入能流殊亦自重乃為子敬書􅄞中散詩得子敬書有時裂作校紙書譜云謝安素善尺牘而輕子敬之書子敬嘗作佳書與之謂必存録安輙題後答之甚以為恨謝奕字無奕安之兄官至安西將軍善行書書賦云逹士逸蹟乃推無奕毫翰云為任興所適謝萬字萬石安之弟官散騎常侍亦工書王珣字元琳洽之子官至給事黄門侍郎善行書王珉字季琰珣之弟官至中書令工𨽻書及行草時謂小王之亞也自𨗳至珉三世善書時人方之杜衞二氏王僧䖍云珉筆力過於子敬書舊品云嘗書四疋素自朝操筆至暮便竟首尾如一又無誤字子敬嘗戲云弟書如騎騾駸駸恒欲度驊騮前斯可謂弓善矢良兵利馬疾穿圍破的難與争鋒書賦云繩繩宜爾傑出季琰露鋒芒而豁懐傍禮樂而無檢猶摶扶摇而坐致超峻極而非險王廞字伯輿即𨗳孫薈子官至司徒左長史善行書書賦云温温伯輿亦扇其風風流之表軒冕之中骨體慢正精彩冲融已髙天然恨乏其功如承奕葉之貴胄備風訓之神童王曠羲之父也官至淮南太守善行𨽻書王羲之字逸少瑯琊臨沂人官至右軍將軍㑹稽内史少有美譽善書為古今之冠草􅈻八分飛白章行備精諸體自成一家之法千變萬化得之神功自非造化發靈豈能登峰造極其所措意皆自然萬象無以加也然剖析張公之草而濃纎折衷乃愧其精熟損益鍾君之􅈻雖還用增華而古雅不逮至研精體勢則無所不工所謂氷寒於水亦猶雅頌得所鍾鼓云乎羲之􅈻行草章草飛白五體俱入神品八分入妙有子七人獻之最知名元之凝之徽之操之並工草􅈻梁武帝評云王羲之書如龍跳天門虎卧鳳閣故厯代寶之永以為訓王元之羲之長子善草書王凝之羲之次子官至左將軍㑹稽内史工草􅈻王徽之字子猷凝之弟官至黄門侍郎善正草書王操之字子重徽之弟歴侍中尚書豫章太守善正行草書王渙之徽之弟善行草書王獻之字子敬逸少第七子清峻有美譽尤善草􅈻兼妙丹青㓜學父書次習於張邇後改變制度别創其法率爾師心𡨕合天矩至於行草興合若孤峰四絶逈出天殊其峭峻不可量也子敬七八歳時學書右軍潛從後掣其筆不脫乃嘆曰此兒當有大名遂書樂毅論一篇與之學後題書賜官奴竟能極小真書窮微入聖筋骨𦂳宻不减於父故人謂之小聖官奴即子敬小字也太元中新起太極殿謝安欲使子敬題榜以為萬世寶而難言之乃說韋仲將題凌雲臺事子敬揣知其㫖乃正色曰仲將魏之大臣寧有此事使其若此知魏徳之不長安遂不之逼也子敬􅈻行草章草飛白五體俱入神品八分入能品或謂子敬為小令非也子敬為中書令太元十一年卒於官年四十三族弟珉代居之至十三年而卒年三十八時謂子敬為大令珉為小令王濛字仲祖太原晉陽人官至長山令哀靖皇后父也追贈光禄大夫善􅈻書法於鍾氏狀貌似而筋骨不備衞臻陶侃並其亞也王僧䖍云王濛書可比庾翼書賦云奥若太原之英二子間生仲祖慕元常之則懐祖王述通文獻王𨗳之情方言慕而我愧比叔文謝藻而此榮習所通而不及恭放之溫放之而先鳴結束體正肆力專成猶猶棟梁富於合抱乃匠斵而未精王修字敬仁濛之子官至著作郎善􅈻書嘗求右軍書乃寫東方朔畫像讃與之殆欲窮其妙而未盡其美子敬毎省修書云咄咄過人始王𨗳愛鍾氏書喪亂狼狽猶衣帶盛尚書宣示帖過江後以與右軍右軍借敬仁及敬仁亡其母見此書平生所好乃遂與入棺殷仲堪書亦敬仁之亞也王述字懐祖太原人官至中書令藍田使善草書書賦云髙利迅薄連屬欹傾猶鳥避羅而勢側泉激石而分横王坦之字文度述之子官至侍中中書令善行書王允之字深猷官至衞將軍㑹稽内史善草行書謝藻字叔文㑹稽人官至中書侍郎善正書書賦云叔文法鍾纎薄精練用筆雖巧結字未善似漸陸之遵鴻等窺巢之乳燕謝璠伯官至散騎常侍善草書見法帖戴逵字安道譙郡銍人隠居不仕㓜有巧慧聰悟博學能鼓琴工書畫總角時以雞子汁溲白瓦屑作鄭𤣥碑自書刻之文既竒麗書亦妙絶戴顒字仲若逵之子隠遯有髙名亦不仕隠居桐廬父善琴書顒並傳其業李充字宏度江夏鍾武人衞夫人之子累遷中書侍郎善楷書妙恭鍾索世咸重之李式字景則即充從兄衞夫人之猶子官至侍中善草􅈻甚佳其叔母善書右軍云李式是平南之流平南將軍王廙也亦可比庾翼弟定子公府能名同式張澄字國明呉郡人官至光禄大夫善正書王僧䖍云張澄書當時亦呼有意書賦云國明勵躬鍾氏餘風壯麗纎薄守雌知䧺如道門之子仙路時通張彭祖澄之子官至龍驤將軍善􅈻書張懐瓘云右軍毎見彭祖縑素尺牘輙存而玩之夷齊雖賢若仲尼不言未能髙舉亦猶彭祖附青雲之士不冺於世也荀輿字長允潁隂人官至國子助教工􅈻書章草嘗寫狸骨方一紙右軍見以為絶倫後擬傚數十通云此乃天然功弗可及也庾肩吾云荀輿狸骨方學而難逮墨妙至此時人不稱猶伯樂之顧則價增十倍然觀其意趣不先於衞夫人當是右軍中年所賞若暮齒而見應不至歎服也劉召字彦祖彭城人官至御史中丞累遷侍中善小篆妙工飛白雖不及張宏亦一時之冠也作飛白書勢一篇時有栁詳亦善飛白彦祖之亞也張翼字君祖下邳人官至東海太守尤善草􅈻劣於王恬時穆帝令翼寫王右軍手表帝自批後右軍殆不能别久乃悟云小人幾欲亂真書賦云君祖馳馭藝忝令譽窮正驗草而罕逮其能作偽亂真而未可為據正企鍾而悠邈草師王而莫著書小史卷五
