body:
  text: 書小史卷六宋陳思撰傳五晋宋齊康昕字君明外國人官至臨沂令善正草書與南州惠式道人俱學二王輙以已書貨之世人有謬寶其蹟或謂為羊欣王獻之嘗題方山亭壁數行昕宻改之獻之後過不疑又為謝居士題畫像以示獻之獻之歎能以為西河之絶矣惠式道人右軍之甥也學二王書歐陽通云其書與王無别何充字次道廬江人官至侍中司空善行書書賦云次道淳實寡於風彩自是雄姿翰墨具在如士大夫之遊華處叅貴胄而膚質未改劉訥字行仁瑯琊人官至散騎常侍善正書書賦云行仁靡雜唯鍾是師悅端閒於髙軌能終始於清規雖帶偏薄亦能隣幾若鳯雛始備於五彩長松僅攀乎一枝劉璞字子成南陽人官至光禄勲郎得道南嶽魏夫人之子善行草書書賦云猗歟子成徇蹟過名正􅈻敦實藁草沉輕元常髙風雖踈復呈猶不考擊之鐘鼓含律呂之音聲劉瓌字元寶沛國人官至御史中丞義成伯善行草八分太元中孝武帝令八分題諸門榜書賦云元寶剛直兩王之次骨正力全軌範宏麗凌突子敬病於輕肆同變武而習文若訪龍而獲驥韋昶字文休即魏侍中誕兄凉州刺史康之元孫官至潁川太守散騎常侍善古文大篆及草書毎覧羲之父子書云二王未是知書者也又妙作筆子敬得其筆稱為絶世太元中孝武改治宫室及廟門並欲使王獻之􅈻書題牓獻之固辭乃使劉瓌以八分書題之後又使昶以大改之江灌字道羣陳留人官至侍中中䕶軍善行書書賦云道羣閒漫氣格自充始習新制全移古風與伯輿王廞之合極若子敬之童䝉猶富禮樂之世胄備神彩於厥躬沈嘉字長茂呉郡人官至呉興太守善草書書賦云長茂草勢既㨗而踈慕王不及獨斷所如猶鷙鳥擊搏而失中因蹭蹬於古墟温放之太原人嶠之子官至黄門侍郎善草書書賦云放之率爾草徤筆力豈忘保持足見凖則猶片錦呈巧細流不極許静民髙陽人官至鎮軍叅軍工草􅈻為右軍髙足善題宫殿額得方直之體其草稍乏筋骨亦景則李式之亞也桓温字元子譙國龍亢人尚南康公主官至丞相大司馬南郡公諡宣武善行草書唐人云温書如快馬入陣屈伸随人書賦云元子正草厚而不倫若遺翰墨猶帶真淳似山林之樂道非玉帛之能親桓𤣥字敬道温之子官至義興太守其後簒晉僭號偽楚劉裕誅之𤣥景慕二王善於草法王僧䖍云毎自比右軍議者未之許云可比孔琳之張懐瓘云𤣥草法譬之於馬則肉肋已就蘭筋初成蓄怒而行日可千里𤣥嘗取羊欣為征西行軍恭軍𤣥愛書呼欣就坐仍遣信呼顧長康與共論書至夜不倦長康亦善書𤣥愛重圖書毎示賔客客有非好事者正食寒具以手授書書大㸃汚𤣥惋惜移時自後毎出圖書具令客盥手𤣥愛二王書不能釋手乃選縑素及紙書正行之尤美者各為一秩嘗置左右及南奔雖甚狼狽猶以自随將敗並投於江書賦云敬道耽玩銳思毫翰依慿右軍志在凌亂草狂逸而有度正疎澁而猶憚如浴鳥之畏人等驚波之泛岸顧愷之字長康小字虎頭晉陵無錫人博學有才氣為桓温殷仲容恭軍善書畫寫特妙謝安深重之謂有蒼生以來未之有也時人號為三絶謂癡書畫也張彦逺云按長康三絶者才絶書絶癡絶也畫非其數諸葛長民瑯琊陽都人官至輔國將軍宣城内史善行書書賦云長民則全効子敬便於性分宏逸生於天機衆妙總而獨運凌所師而小薄壯若已而不紊猶豁其流而氷開殷其響而雷奮袁山松官至呉郡太守少有才名博學有文章善書梁武帝云袁山松書如深山道士見人便欲退縮殷仲堪陳郡人官至冠軍將軍荆州都督能清言善屬文能書亦王敬仁之亞也陳暢滎陽人官至秘書令史善八分書晉宫觀城門皆暢書楊真人諱羲𢎞農人居句容該渉經史有通靈之鑒善正行書簡文用為公府舎人後得道書賦云楊真人之正行兼淳熟而相成方圓自我結構遺名如舟檝之不繫混寵辱以若驚謝静不知何許人善􅈻書謝敷字慶緒㑹稽人性澄静寡慾隠居徵辟皆不就善􅈻書王僧䖍云謝静謝敷並善寫經亦入能境宋珽廣平人官至相府恭軍善行書書賦云宋珽矯矯足光利用習古者或以為輕目新者必因而重猶樸散而分形器務成而立賦頌王綏字彦猷坦之之孫官至冠軍將軍荆州刺史善正行書羊忱㤗山人官至徐州刺史善行草書庾肩吾云聲擅毫翰動成楷則羊固㤗山人官至臨海太守善正行書盧循字子先少名元龍官至征虜將軍廣州刺史善草􅈻奕棊之勢循善尺牘尤珍名法西南豪士咸慕其風家贏金帛競逺尋求於是京師三呉二王之蹟頗為所得宋劉穆之字道和東莞莒人官至侍中司徒善􅈻行書與朱齡石並便尺牘嘗於武帝坐與齡石並答書自旦至日中穆之得百函齡石得八十函而穆之應對無廢書賦云道和閒雅離古躡真慢正尤徳髙踪絶塵若昻藏博達之士謇諤朝廷之臣朱齡石字伯兒沛人官至雍州刺史善尺牘羊欣字敬元㤗山南城人官至中散大夫義興太守少靖黙無競於人泛覽經籍尤長􅈻書師資大令張懐瓘云敬元真書劣於子敬幾季孟之差行草則去之彌逺子敬之後可以獨歩時人云買王得羊非意所望今大令書中風神怯而瘦者徃徃是羊也時有丘道䕶稱工書親師子敬殊劣於羊欣書賦云敬元則親得法於子敬雖時移而間出手稽無方心敏奥術虚薄而不忘本分縱橫而粗得師骨遇其合時髣髴唐突猶圖騏驥而莫展素真仙而非實孔琳之字彦琳㑹稽山隂人廞之子官至太常卿少好文義善􅈻行草書張懷瓘云師於小王稍露筋節飛流懸沫勢則吕梁之水焉時稱云羊真孔草又以縱快比於桓𤣥王僧䖍云孔琳之放縱快利筆道流便二王以後略無其比但功夫恨少自任故未能盡其妙故當劣於羊欣斯言逾矣薄紹之字敬叔丹陽人官至給事中善書張懐瓘云與羊欣並憲章小王風格秀異若干將出匣光芒射人魏武臨戎縱横制敵其行草書倜儻時越羊欣若周才取之則真正懸隔袁昻云字勢蹉跌如舞女低腰仙人嘯樹至於揮毫振紙有疾閃飛動之勢書賦云競其豐利又覩薄氏纎圓克成骨力猶稚精彩潤宻乃誠莫掩掩友凌師抑亦其次雖鍮無金價而珉實玉類謝靈運陳郡人晉車騎將軍𤣥之孫也官至秘書監侍中康樂侯善書模憲小王真草俱美張懐瓘云若石藴千年之色松標百尺之柯雖不逮師吸風吐雲􆂐蕩山岳其亦庶幾靈運詩書皆兼獨絶毎文竟手自寫之文帝稱為二寶與顔延之為江左第一虞龢云靈運母劉氏乃獻之之甥故能書而特多王法王僧䖍云子敬上表多在中書雜事中靈運皆竊易其真本相與不疑元嘉初帝就索始進焉親聞文皇說此謝方明陳郡陽夏人官至㑹稽太守善正書書賦云方明寛和隠媚且潤如幽閒女徳禮教士允謝恵連方明之子官至司徒府法曹叅軍㓜有詞學族兄靈運深所歎伏書畫並妙謝晦字宣明陳郡陽夏人官至中書令善書見庾肩吾書品謝莊字希逸官至中書令散騎常侍善行書蕭思話南蘭陵人官至征西將軍左僕射觧音律工書受學於羊欣得行草之妙論者謂雖無竒峰壁立之秀連岡盡望勢不斷絶亦可謂有功矣王僧䖍云蕭全法羊欣風流媚好殆欲不减筆力恨弱𡊮昂云羊真孔草蕭行范篆各一時之妙也然上方琳之不足下比范􅁮有餘書賦云思話綿宻緩歩娉婷任性工􅈻師羊過青似鳬鷗雁鶩㳺戲沙汀王曇首僧䖍父也㓜而素尚兄弟分財曇首惟取圖書而已文帝時為侍中驍騎將軍善行書范􅁮字蔚宗順陽人官至太子詹事藴良史之才通音律之妙能􅔜草􅈻小篆尤精師範羊欣慕其俊㧞王僧䖍云與蕭思話同師羊欣而􅁮後背叛皆失故歩名亦稍退􅁮傳自序云吾書雖小小有意筆勢不快餘竟不成就毎愧此名張裕字茂度齊郡人官至㑹稽太守善行草書張永字景初裕之子官至征西將軍渉獵經史能文章善􅈻書行草文帝曰卿書但少王法永對曰毎恨二王不得臣之體永更製御筆紙墨美殊前後書賦云茂度逸翰景初清規或大言而峻薄景初對文帝云臣恨二王不得臣體或寡譽而拙竒王僧䖍書用拙筆以自容並心輕兩王蹟及宗師擬鶴鳴而子和殊鯉退而學詩謝綜中書侍郎述之子范􅁮甥也官至太子中舍人有才藝善􅈻書王僧䖍云謝綜書其舅云𦂳潔生起實為得賞毎不重羊欣欣亦憚之然書法有力恨少媚好顔延之字延年瑯琊臨沂人官至金紫光禄大夫領湘東王帥少孤貧居好讀書無所不覧文章冠絶當時尤善書翰與陳郡謝靈運詞彩齊名江左稱顔謝焉文帝嘗問延之諸子才能延之曰峻得臣筆測得臣文􅎢得臣義躍得臣酒顔峻字士遜延之之子官至右將軍揚州刺史善行書書賦云顔氏儒門士遜墨妙大令典則中散氣調薄首孔肩體格惟肖如驚弦履險避地膺峭王裕之字敬宏晉驃騎將軍廙之曾孫官至侍中光禄大夫善草書名與宋武帝諱同故以字行書賦云淮水茂族敬宏不墜故朝餘風翰墨兼至既約古而任逸亦遺能而獨駛猶剏埏植於昔人全樸畧而成器王微字景元瑯琊臨沂人少好學善屬文工書兼觧音律醫方卜筮隂陽術數之事尤善行草微嘗獨處一室尋書玩古遂足不履地終日端坐牀席皆生塵埃惟當坐處獨浄世祖以貞栖絶俗贈秘書監宗炳字少文南陽人前後辟召皆不就少文妙善琴書圖畫行草尤工毎遊山水徃輙忘歸凡所逰厯皆圖之於室坐卧嚮之其髙情如此丘道䕶善草書與羊欣同受筆法於王獻之殊劣於羊欣李嗣真云道䕶謬登髙品迹乃浮漫王思元瑯琊人官至南康太守善行書書賦云蔓衍枝𣲖思元不忘穏厚而無法度淳和而蓄鋒鋩猶君子自適順時行藏桓䕶之字彦宗略陽人官至寧朔將軍善行書書賦云桓公䕶之神凝筆遲富雅景乏士規猶門寒道髙衣薜言詩駱簡字正祖丹陽人官至鉅野令善行草書書賦云翩翩正祖恭已法則師資小王深入閫域安知逸氣未詳筆力猶驥異真龍紫非正色龎秀之官至江州刺史善正書書賦云二王變古法有所屬兢兢秀之歛翰謹束如仙童樂静不見所欲巢尚之字仲逺魯國人官至寧朔將軍善行書書賦云仲逺循常由衷邇俗企彦琳孔琳之之墻􅌇遵茂度張裕之􅁤躅豈聞一而得三同出呉而入蜀裴松之字世期河東聞喜人官至散騎常侍善草書書賦云世期旁通掘强斷利参方回郄愔之章法得敬元羊欣之草意匪庖丁之觧牛同君子之不器徐爰字長玉瑯琊人官至中散大夫善正書書賦云長玉靡漫神閒態穠荷小王之偉質錯明帝之髙蹤執徳而風塵不雜發言而禮義攸從江僧安陳留人官至太子中庶子善行書書賦云江侯僧安㨗利而乾貌兼輕媚體出多端猶廣廷之卉木小苑之峰巒賀道力會稽人官至呉興令善草書王僧䖍云顔騰之賀道力並便尺牘書賦云道力草雄圓轉不窮壯自躬之體格疲逸少之遺風猶立言而逍遥出世驗迹乃夙夜在公王道迄呉興烏程人即道隆之兄渉學善􅈻書形貌又美呉興太守王韶之謂人曰有子弟如王道迄無所少也齊王僧䖍瑯琊臨沂人曇首之子官至尚書令簡穆公弱冠工書張懐瓘云祖述小王尤尚古直若溪㵎含氷岡巒被雪雖極清肅而寡於風味子曰質勝文則野此之謂乎初宋文帝見其書素扇歎曰非惟蹟踰子敬方當雅量過之齊髙帝善書及即位篤好不已嘗與僧䖍賭書畢謂僧䖍曰誰為第一僧䖍對曰臣書臣中第一陛下書帝中第一上笑曰卿可謂善自謀矣武帝工書欲擅書名僧䖍不敢顯其蹟嘗用拙筆書以此見容書賦云僧䖍則宻緻豐富得能失剛鼔怒駿爽阻圎任強然而神髙氣全耿介鋒鋩發卷伸紙滿目輝光才行兼而雙絶名實副而特彰如運籌决勝威震殊方王慈字伯寶僧䖍之子官至侍中冠軍善行書少與從弟儉共書學謝鳳子超宗嘗候僧䖍乃徃東齋詣慈慈正學書未即放筆超宗曰卿書何如䖍公慈曰慈書比大人如雞之比鳯超宗狼狽而退王志字次道慈之弟官至侍中吏部尚書善藁􅈻當時以為楷法㳺擊將軍徐希秀亦號能書常謂志為書聖書賦云伯寶次道並資義訓兄則雜而外兼禀家君於已分弟則纎薄無滯過庭益俊並能寛閒墨妙逸速毫奮比達士與君子人不知而不愠王儉字仲寶僧綽之子官至尚書令善正書褚淵字彦回河南陽翟人少有世譽善草􅈻書宋末與髙帝同掌樞宻齊臺建以佐命功授司徒中書監書賦云彦回無節筆翰亦爾决利不拘足用而已如㧞楓栁抑亦把梓禇賁字蔚先淵之子官至秘書監善􅈻書因父憂免職便不仕時人以為恥父失節於宋室遂爾屏居書賦云蔚先忠良自我名揚老成不虧和雅允臧如窮隠肥遯志傲侯王劉休字宏明沛郡相人建元初官至御史大夫出為豫章太守善􅈻書初羊欣授子敬正􅈻法衆共宗仰以右軍之體㣲古不復見貴及休始好右軍法因此大行源楷之字郍延官至黃門侍郎善草􅈻徐孝嗣字始昌東海人官至太尉尚書令善正書書賦云非禮不言從容始昌如碩徳君子道義難量而盛徳有素筆精源長劉係宗丹陽人官至寧朔將軍宣城太守少便書畫尤工行草在宋為竟陵王誕子景粹侍書入齊為東宫侍書蕭惠基思話之子官至左僕射善􅈻行書及奕棊之勢張欣泰字義亨竟陵人少有志貌不以武業自居好讀子史善􅈻書到撝字茂謙彭城人官至太子洗馬御史中丞善行書書賦云茂謙則壯而不宻騁志恒俗輕師模任縱欲如勇夫格獸徑越林麓顧寶光呉郡人官至司徒左曹掾工畫善行書寶光卓越多竒自以伎能王僧䖍嘗作飛白書以示之寶光曰下官今為飛白屈矣胡諧之豫章南昌人官至度支尚書善行書書賦云寶光諧之同調合韻差池去就羽翮齊振依蕭附王但曰慕藺論骨氣而胡壯驗精神而顧峻猶岸栁之先春得地連於河潤紀僧真建康人善􅈻書事髙帝在淮隂以嫻書題令答逺近書蹟自寒宦厯至髙帝冠軍府將軍主簿初上在領軍府令僧真學上手蹟下名至是報答書疏皆付僧真上觀之笑曰我亦不復能别也紀僧猛僧真之弟官至晉煕太守有風姿舉止善􅈻書又能飛白書徐希秀瑯琊人官至驍騎將軍善行書書賦云希秀之蹟敬叔薄紹之之倫正則謹促有度草則拘檢靡伸如儉徳君子清朝士人張融字思光呉郡人官至司徒左長史書兼諸體尤工於草如風裊春林甚有媚好齊梁之世殆無以過嘗自美其能帝曰卿書殊有骨力但恨無二王法融答曰非恨臣無二王法亦恨二王無臣法書賦云思光逸才揮翰無滯超寶光之力從僧䖍之制越恒規而渉徃出衆格而靡繼如塞路蓬轉摩霄鳶唳謝脁字元暉陳郡陽夏人官至吏部郎中風華黼藻獨歩當時工草􅈻蟲篆張懐瓘云書甚有聲草殊流美亦猶薄暮川上餘霞照人春晚林中飛花滿目顔延之亦善草書即脁之亞也宗測字敬微炳之孫也代居江陵不應召辟驃騎將軍豫章王嶷請為叅軍測答曰何為謬傷海鳥横斤山木性善書畫傳其祖業劉瑱字士温彭城人官至吏部郎中聰慧多才藝工書畫劉繪字士章彭城人性通悟有文義善􅈻書進對華敏數被召賞官至司馬從事中郎撰能書人名一卷嘗自云善飛白書言論之際頗好矜知王僧祐字允宗微之從子官至黄門郎雅好博古善老莊不尚繁華工草􅈻善鼓琴周顒字彦倫汝南安城人初為文惠太子中軍恭軍厯官至中書郎兼著作常㳺侍東宫少從外氏車騎將軍臧質家得衞恒散􅈻書法學之甚工尤善行􅈻文惠太子使顒書元圃茅齋壁國子祭酒何允以倒薤書求就顒換之顒笑而答曰天下有道丘不與易也李嗣真云彦倫迹少俊銳可嘉書小史卷六
