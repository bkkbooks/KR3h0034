body:
  text: 書小史原序書小史者中都陳道人所編也自伏犧畫卦以至五代上下數千百年之間字體變化如浮雲紀𫝊所載以書名者代不乏人而人之賢否藝之高下雖妙跡不能盡傳於世觀此亦可槩見其萬一道人趣向之雅編類之勤可謂不苟於用心矣予識之五十餘年每一到都必先來訪訂證名帖飽窺異書愈乆而愈不相忘亦未易多得也咸淳丁卯重九天台謝愈修書於西湖寓舎時年七十有四欽定四庫全書子部八書小史目録藝術類一書畫之屬卷一紀卷二𫝊卷三傳卷四𫝊卷五傳卷六𫝊卷七𫝊卷八傳卷九傳卷十傳臣等謹案書小史十卷宋陳思撰思即臨安書賈嘗輯寳刻叢編以行世者其所作書苑菁華專取漢魏以來論書之語集成一編採掇頗見雅贍魏了翁為序之此則以歴代書家小傳纂次成帙前有咸淳丁卯天台謝愈脩序盖與書苑菁華相輔而行者也書中所載自庖犧迄五季凡紀一卷載帝王五十一人傳九卷首后妃十人附以諸女十三人次諸王二十七人次倉頡至郭忠恕共四百三十人中間義例亦多未善如閨秀一門自宜依史例退置書末乃以厠於后妃諸王之間殊為乖舛又如北齊彭城王浟本無能書之名惟史載其八歲時書迹未工為博士韓毅所戯思因此一節遂一槩採入書家中尤為氾濫逈不及書苑菁華之詳宻特其排比薈粹猶有可觀頗可為考古者檢閲之助其用心固有足尚者焉乾隆四十六年九月恭校上總纂官臣紀的臣陸錫熊臣孫士毅總校官臣陸費墀
