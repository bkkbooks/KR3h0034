body:
  text: 書小史卷八宋陳思撰傳七後魏北齊後周隋後魏崔恱字道儒清河東武城人善草𨽻與范陽盧諶並以博藝齊名故魏初重崔盧之書諶傳子偃偃傳子邈恱傳子潜潜傳子宏世不替業崔潜恱之子善𨽻草常為兄渾等誄手筆本草延昌初著作佐郎王遵業買書於市遇得之年將二百寳其書迹深藏秘之武定中遵業子松年將以遺黄門郎崔季舒人多摹搨之左光禄大夫姚元標以工書知名於時見潜書以為過於浩也崔宏字𤣥伯潜之子官至吏部尚書爵白馬公少有俊才尤善草𨽻為世模楷行押特盡精巧宏自非朝廷文誥四方書檄初不妄染故世無遺迹崔浩字伯淵宏之子官至司徒博覽經史𤣥象隂陽百家之言無不該覽太祖以其工書常置左右人多託寫急就章從少至老初不憚勞所書葢以百數浩書體勢及其先人而巧妙不如也世寳其迹多裁割綴連以為模楷崔簡一名覽字仲亮浩之弟好學少以善書知名道武初歴中書侍郎爵五等侯叅著作事崔衡字伯玉官至内秘書中散少以孝行著稱善𨽻札學崔浩頗亦相類當時詔命及御所覽書多其迹也盧𤣥字子真范陽涿人曽祖諶晉司空劉琨從事中郎祖偃父邈並仕慕容氏初諶父志法鍾繇書子孫傳業累世有能名至𤣥父邈以上兼善草迹𤣥子伯源習家法代京宫殿多其所題白馬公崔宏亦善書世傳衛瓘體魏初工書者崔盧二門盧晏博學善𨽻書有名於世位給事黄門侍郎江式字法安陳留濟陽人六世祖瓊字孟琚晉馮翊太守善蟲篆詁訓永嘉大亂瓊棄官投張軌子孫因居涼土世傳家業祖强字文威凉州平内徙代京上書三十餘法各有體例又獻經史諸子千餘卷擢拜中書博士式少專家學篆體尤工洛京宫殿諸門榜題皆式書也延昌中撰集字書號曰古今文字凡四十卷以許氏說文為本上篆下𨽻官至符節令兼著作郎江順和式兄之子官至征虜將亦工篆書盧魯元昌黎徒河人敏而好學寛和有雅度以工書有文才累遷中書監領秘書事賜爵襄城公善正𨽻書谷渾字元冲昌黎人道武時以善𨽻書為内侍左右太武時累遷侍中儀曺尚書賜爵濮陽公竇遵頓丘衛國人善楷篆北京諸碑及臺殿樓觀宫門題署多遵書位至濮陽太守竇僧演遵之子以善書拜庫部令崔挺字雙根博陵安平人少敦學業多所覽究舉秀才射策髙第拜中書博士轉中書侍郎以工書受勅於長安書文明太后父燕宣王碑賜爵泰昌子沈法㑹兖州人能𨽻書宣武在東宫𠡠法㑹侍書後以𨽻迹見知於閭里者甚衆未有如崔浩之妙劉芳字伯友彭城人官至安東將軍青州刺史善正書少時聰敏過人篤志墳典晝則傭書以自資給夜則讀誦終夕不寢嘗為諸僧寫經論筆迹稱善卷直一縑嵗中能入百餘疋如此數年頼以頗振著音義明辨疑者皆徃詢訪故時人號為劉石經撰急就篇續注音義三卷劉懋字仲華芳之從子官至太尉司馬聰敏好學博綜經史善草𨽻書識竒字郭祚字季祐太原晉陽人官至征西司馬將軍雍州刺史祚涉獵經史習崔浩尺牘文章見稱於世尤善行書栁僧習官至潁川太守敏於當世特善正書栁楷字士則河東解人善草書頗涉文史位撫軍司馬夏侯道遷譙國人歴華瀛二州刺史遍覽書史嫺習尺牘庾道頴川人歴覽史傳善草𨽻仕梁位右中郎將與夏侯道遷俱入魏後為饒安令卒曺世表字景昇魏大司馬休九世孫性雅正工尺牘涉獵羣書孝昌中為尚書右丞遷東南道行臺孫伯禮武邑人光禄大夫惠蔚之子善𨽻書位國子博士裴敬憲字孝虞河東聞喜人為太學博士少有志行學博才清工𨽻草解音律王世弼京兆覇城人官至中山内史平北將軍魁岸有壯氣善草𨽻書好窮墳典王由字茂道世弼之子位至東萊太守好學有文才尤善草𨽻書性方厚有名士風又工摹書為時人所服李苗字子宣梓潼涪人官至尚書左丞善屬文工尺牘蔣少遊樂安博昌人有才學敏慧機巧工畫善行草書及雕刻官至將作大匠太常少卿前將軍都水兼此四官劉仁之字山靜歴位衛將軍西兖州刺史少有操尚粗涉書史真草筆迹頗號工便李思穆官至營州刺史工草𨽻為當時所稱沈嵩官至司馬即文秀族子善行書吕溫字晞陽為上黨太守善𨽻書盧淵官至秘書監善正書傳鍾法有能名宇文忠之河南洛陽人官至右丞涉獵文史頗有筆札尤善行草北齊趙隱字彦深南陽宛人性聰敏善書計初為尚書令司馬子如賤客供寫書子如善其無誤用為書令史神武在晉陽索二史子如舉彦深後徵補大丞相功曺叅軍專掌機宻文翰多出其手稱為敏給累官至司徒張景仁濟北人㓜孤家貧以學書為業遂工草𨽻選補内書生與魏郡姚元標潁川韓毅同郡袁買奴滎陽李超等齊名世宗並引為賓客天保八年𠡠教太原王紹德書後主在東宫世祖選善書人性行淳謹者令侍書景仁遂被引擢後主登祚歴位至開府侍書如故尋除侍中封建安王自倉頡以來八體取進一人而已崔季舒字叔正挺之從子官至光禄大夫待詔文林館涉獵經史長於尺牘有當世才具杜弼字輔元中山曲陽人㓜聰敏為征虜府墨曺叅軍典管記弼長於𨽻札毎為時軰所推韓毅魯郡人工正書神武用為博士以教彭城景思王浟元行恭河南洛陽人美姿貌兼俊才善正行書位中書舍人待詔文林館李元䕶遼東襄平人少有武力仕齊位馬頭太守雖以將用自達然亦頗覽文史習於尺牘劉珉字仲寳彭城人官至三公郎中善行草書李嗣真云珉書如顛波赴海狂澗争流書賦云蕭條北齊浩汗仲寳劣充凡正備法緊草遐師右軍倏爾由道究千變而得一乗薄俗而居老如海岳髙深青分孤島劉元平珉之子髙道不仕贈貞範先生善行草書殷英童善楷𨽻書兼工畫後周黎景熈字季明河間鄚人從祖廣魏太祖時為尚書郎善古學從崔宏崔浩受學字義楷篆自是家傳其法季明亦傳習之頗與許氏小異周文徵入關令季明正定古今文字於東閤歴官至車騎將軍儀同三司趙文深字德本南陽宛人少學楷𨽻年十一獻書於魏帝後立義歸朝除丞相府法曹叅軍文深雅有鍾王之則筆勢可觀當時碑牓惟文深及兾雋而已太祖以𨽻書紕繆令文深與黎季明沈遐等依說文及字林刋定六體成一萬餘言行於世及隋文帝平江陵之後王褒入關貴游等翕然並學褒書文深之書遂被遐棄文深慙恨形於言色後知好尚難反亦改習褒書然竟無所成轉被譏議謂之學步邯郸焉至於碑牓餘人獨莫之逮王褒亦每推先之宫殿樓閣皆其迹也世宗令至江陵書景福寺碑漢南人士亦以為工梁主蕭詧觀而美之賞遺甚厚天和元年露寢等初成文深以題牓之功除趙興郡守趙仲將彦深之子官至給事黄門侍郎散騎常侍沉敏有父風溫良恭儉雖妻子亦未嘗怠慢終日儼然學涉羣書善草𨽻雖與弟書書字楷正云草不可不解若施之於人即似相輕易若當家卑㓜又恐其疑所在宜爾是以必湏𨽻筆冀雋字僧雋太原陽邑人性沉謹善𨽻書特工模寫太祖令雋偽為魏帝𠡠書與費士顯令將兵助太祖討侯莫陳說雋依舊𠡠模寫及代舎人主書等署與真無異顯嘗得魏帝𠡠書及見此𠡠不以為疑遂遣步騎一千授太祖節度尋徵教世宗及諸王𨽻書時俗入書學者亦行束修之禮謂之謝章雋以書字所興起自倉頡若同常俗未為合禮遂啟太祖釋奠倉頡及先聖先師官至驃騎大將軍開府儀同三司王褒字子淵瑯琊臨沂人官至司空博覽文史尤工屬文特善草𨽻梁國子祭酒蕭子雲褒之姑夫也褒以姻戚去來其家遂相模範俄而名亞子雲並見重於世雖風神不峻亦士君子之流也蕭撝字智遐蘭陵人梁武帝弟安成王秀之子也博觀經史雅好屬文侯景亂武陵王紀稱帝於蜀以撝為益州刺史周文伐蜀撝降歴少傅蔡陽郡公撝善草𨽻名亞於王褒蕭慨梁武帝弟司空鄱陽王恢之孫深沉有體表好學善草𨽻書歴著作佐郎待詔文林館終於司徒從事中郎竇慶扶風平陵人襲封陳公有姿儀性和厚工草𨽻竇璡慶之弟亦工草𨽻頗解音律官至潁川南郡扶風太守庾信字子山南陽新野人梁散騎常侍肩吾之子㓜而俊邁博覽羣籍善行書仕周位至驃騎將軍開府儀同三司栁宏字匡道官至御正下大夫少聰頴亦善草𨽻博涉羣書辭彩雅贍與𢎞農楊素為莫逆之交元禮少有志氣好弓馬嫻草𨽻有士君子之風累遷征東將軍顔之推字介瑯琊臨沂人協之子聰頴機悟博識有才辯工尺牘大象末為御史上士薛慎字伯䕶河東汾隂人好學能屬文善草書歴中大夫保定初出為湖州刺史隋楊素字處道𢎞農華隂人少落拓有大志不拘小節善屬文工草𨽻盧昌衡字子均范陽人官至祠部侍郎太子左庶子風神澹雅博涉經史工草行書書賦云昌衡跌宕率爾而作雖蔑法而或乖乃由􅇆而不怍似野筍成竹長風隕籜閻毗榆林盛樂人能篆書工草𨽻尤善畫為當時之絶周武帝時拜儀同三司隋文帝愛其才藝令侍東宫官至朝散大夫將作少監趙孝逸湯隂人官至四門助教深師右軍逸効大令甚有功業當平梁之後王褒入國舉朝貴胄皆師於褒惟孝逸與文深二人獨負二王之法俱入隋臨二王之迹人間徃徃為貨耳書賦云文深孝逸獨慕前蹤至師子敬如欲登龍有宋齊之面貌無孔薄之心胷釋智永㑹稽人師逺祖逸少工草𨽻妙傳家法嘗臨寫真草千文八百本散與人外江東諸寺各施一本今有存者猶直數萬錢住吳興永欣寺積年臨書所退筆頭置之大竹簏受一石餘而五簏皆滿人來覓書或求乞師者如市所居門限為之穿穴乃用鐵葉裹之人謂之鐵門限後取筆頭瘞之號退筆􅊘自製其銘張懐瓘云師逺祖逸少歴紀專精攝齊升堂真草惟命夷途良轡大海安流微尚有道之風半得右軍之肉兼能諸體於草最優氣調下於歐虞精熟過於羊薄釋智果㑹稽人工書銘石煬帝甚善之其為瘦健造次難類嘗謂永師曰和尚得右軍肉智果得其骨張懐瓘云夫字有萬象元鑑於心好其體質而布其意且筋骨藏於膚肉山水不厭髙深而此公稍乏清幽傷於淺露若吳人之戰輕進易退勇而非武虚張夸耀果𨽻行入能品時有僧休僧特與果俱師智永休困於肥鈍特傷於瘦怯皆不得中而智果差優書賦云智永智果禪林筆精天機淺而恐泥志業髙而克成或拘凝重蕭索家聲或利凡通周章擅名猶能作緇門之領袖為當代之凖繩並如君子勵躬於有道髙人保志而居貞釋敬脫善正書能用大筆寫方文字天然遒勁不加修飾當時謂之僧傑庾持字元德潁川鄢陵人篤志好學尤善書記以才藝聞名官至步兵校尉持善字書毎屬書好為竒字虞綽字士裕㑹稽餘姚人官至著作佐郎博學有俊才尤工草𨽻丁道䕶官至襄州刺史從事善正書蔡君謨云道䕶書兼後魏遺法隋唐之交善書者衆皆出一法道䕶所得最多虞世基字懋世㑹稽餘姚人博學有髙才兼善草𨽻官至内史侍郎房彦謙字孝冲清河人官至司𨽻刺史解屬文善草𨽻人有得其尺牘者皆寳玩之前後居官所得俸禄皆以周恤親友家無餘財嘗從容獨笑顧謂其子𤣥齡曰人皆因禄富我獨以官貧所遺子孫在於清白耳書賦云彦謙草力浮𦂳循常糟粕右軍之化依稀夫子之牆如益星榆之衆象無月桂之孤光史陵善正書筆法精妙不减歐虞張懐瓘云褚遂良嘗師受史陵然史亦有髙古傷於疎瘦書小史卷八
