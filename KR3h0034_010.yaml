body:
  text: 書小史卷十宋陳思撰傳九唐蕭誠蘭陵人官至右司員外郎工正書善摹勒弟諒亦善書世謂誠真諒草開元中時尚褚薛誠為之最善李邕每不重誠誠因採西山野麻虢郡土糓造五色斑文紙作王右軍書帖與之邕覽翫不悟謂其真迹誠因道其所撰邕乃歎服張庭珪河南濟源人官至太子詹事工八分書素與李邕親善屢上表薦之邕所撰碑碣必請庭珪八分書之甚為時人所重庭珪家多法書亦善正𨽻頗有獻之之法史白廣陵人官至諫議大夫善飛白史惟則字子華白之子官至殿中侍御史工八分頗近鍾書發筆方廣字形峻美亦為時所重尤善篆籀飛白弟懐則亦善八分書賦云史侍御惟則必優世業階乎籀篆古今折衷大小應變如因髙而矚逺俯川陸而必見蔡有鄰濟陽人官至胄曺叅軍善八分始拙弱至天寳中遂精妙相衛間多其筆迹蔡希寂有鄰從子為洛陽令深工草𨽻頗為當時所稱田琦雁門人武德功臣兵部尚書德平之孫工八分小篆署書圖畫歴官豫蘄許等州刺史書賦云赫赫許昌翰苑文房徴前賢而少對當聖代而難方顧誡奢官至太子文學翰林院侍詔善八分杜甫集有贈顧八分文學詩即誡奢也詩云中郎石經後八分盖顦顇顧侯運鑪錘筆力破餘地昔在開元中韓蔡同贔屭𤣥宗妙其書是以數子至此詩盖謂誡奢也韋陟字殷卿京兆萬年人風格秀整善文辭書有楷法常以五彩牋為書記使侍妾主之其裁荅授意而已皆有楷法惟陟署名自謂所書陟字若五朶雲時人慕之號郇公五雲體吕摠云韋陟書如蟲穿古木鳥踏花枝韋斌陟之弟少修整好文藝善𨽻書與兄陟齊名天寳中為中書舍人集賢院學士衛包京兆人工八分古文小篆通字學兼象緯之術官至尚書郎包以古文見稱於當時甚盛蘇詵字廷言丞相瓌之子善八分瓌與東明觀道士周彦雲素相往來彦雲將為其師建碑謂瓌曰成某志不過煩相君數子耳五郎文頲六郎致石泳七郎書詵瓌大笑不言而心服其公鄔肜錢塘人為金吾兵曺叅軍善草書妙得其法時人比之張旭盖親得張公之㫖吕摠云鄔肜書如寒林栖鵶平岡走兎徐安貞善𨽻書初名楚璧開元中為中書侍郎嘗叅李右相議後林甫用事恐罪累乃逃隱於衡嶽為掇蔬行者而病啞不言數年後因修建佛殿僧中選善書者題其梁己二三人矣徐行者跨梁而過掌事人怒以杖連擊其背徐以手畫地曰口雖不言昔年曽學大書願試書及題數行羣僧皆恱服因遣盡書之後李邕過寺見其題處大驚召之同載而歸胡霈然安定人工行書八分小篆筆法雖未至而媚熟可喜上黨佛寺畫壁多霈然所書李造隴西人官至起居舍人武都公善𨽻書入能品李潮杜甫之甥善八分小篆杜甫盛稱之以比蔡有鄰韓擇木見杜集八分小歌徐嶠之越州人官至廣平太守善正行草書名冠古今無以為比常以其法授其子浩嶠之神道碑云初獻䇿十八篇進書六體明皇手詔荅曰得所進書甚可觀覽囬鸞顧鵲墜露凌雲既極臨池之功足方懸帳之妙今賜物三十叚用彰翰墨之佳也徐浩字季海嶠之之子官至彭王傅㑹稽郡公善正行草書四方詔令多出浩手遣辭贍速而書法至精帝喜之嘗書二十四幅屏八體皆偹草𨽻尤工世狀其法曰怒猊抉石渇驥奔泉王維字摩詰太原祁人官至尚書右丞與弟縉齊名維工草𨽻善畫能詩名盛於開元天寳間豪英貴人虚左以迎寧薛諸王待若師友畫思入神至山水平逺雲勢石色繪工以為天機所到學者不可及也其詩自云夙世定詞客前身應畫師王縉字夏卿維之弟官至丞相善草𨽻書功超薛稷國史補云縉與維名望首冠一時議者云論詩則王維崔顥論筆則王縉李邕祖詠張説不得預焉李陽氷趙郡人官至將作大匠工於小篆初師李斯嶧山碑後見仲尼吳季札墓誌變化開闔龍蛇盤踞勁利豪爽風行雨集文字之本悉在心胷自言得籀之宗㫖斯翁之後直至小生曺喜蔡邕不足數識者謂之倉頡後身從子謄亦工小篆書賦云吾家世業趙郡李君嶧山並騖宣父同羣洞於字學古今通文家傳孝義意感風雲張諲官至刑部員外郎明易象丹青善草𨽻與王維李頎為詩酒丹青之友李頎荅詩云小王破體嫻文䇿落日梨花照空壁詩堪記室妬風流畫與將軍作勍敵畫一作書李權淮安王神通之曽孫歴官金州刺史工八分李樞權之弟官至侍御史工小篆李平鈞權之姪官至江陵掾富詞學工小篆兼妙山水並冠絶一時書賦云温良之德書畫兼美誠依仁以游藝同上善之若水鄭遷及弟邁逾並工八分遷官至浚儀尉季弟逾兼善山水天寳中知名梁宋書賦云滎陽昆弟内外光華揮毫美麗自是一家㓜弟曰逾丹青大誇信斵玉而剖石即揀金而披沙張懐瓘海陵人為翰林供奉右率府兵曺叅軍善正行草書亦能臆斷吕摠云懐瓘草書如露花濯錦淵月沉珠懐瓘每云書者猶人相知始疎而終宻則大同始宻而終疎則大異小人甘以壊君子淡以成耀俗之書甘而易入乍觀肥滿恱心豁目亦猶鄭衛之在聽焉撰評書藥石論書斷書佑等書行於世弟懐瓌亦善書官至盛王府司馬待詔翰林顔允南字去惑惟貞之子官至國子司業少以詞藻擅名工草𨽻書尤善五言詩深為伯父元孫所稱顔真卿字清臣允南之弟官至太子太師魯國公少勤學孝敬有文辭善正行書結筆濃秀尤尚字學可謂書之大雅矣陸羽嘗論其體得羲之之筋骨心肺也公受筆法於張長史又嘗問法於釋懐素素告以坼壁路公曰何如屋漏痕素起捉公手曰老賊得之矣張志和字子尚婺州金華人性髙邁不拘自稱煙波釣徒著𤣥真子亦以自號與顔魯公友善工草書跡甚狂逸亦善圗山水自為漁歌畫之甚有逸思韓滉字太冲京兆長安人官至左僕射平章事封晉國公工𨽻書章草尤善雜畫書得張旭筆法畫與韓幹相埒自言不能定筆不可論書畫以非急務故自晦不傳於人張從申官至大理司直志業精絶工正行書握管用筆期於結字𦂳宻近古所無恨於歴覽不多聞見遂寡右軍之外一步不窺意多搨書闕於真迹黄長睿云從申雖學右軍其原出於大令筆意與李北海同科故名重一時宜不虛得但所短者抑揚低昻太過又真不及行耳然唐人而有晉韻殊可嘉尚弟從師監察御史從義從約灼然有才並工書皆得右軍風規時人謂之張氏四龍書賦云張氏四龍名揚海内厥有季弟功夫少對右軍風規下筆斯在季謂從申也劉繪彭城人為延安都督善書明若山平原人為京兆三原縣尉大理評事善書書賦云延安君則快速不滯若懸流得勢三原君則婉媚工宻似垂楊應律竇蒙字子全官至國子司業善書書賦云吾兄則書包雜體首冠衆賢手關目瞥瞬息彌年比夫得道家之深㫖習閬風而欲仙竇臮字靈長蒙之弟官至刑部員外郎詞藻雄贍草𨽻精絶著述書賦一篇兄蒙為之注喬龜年善小篆養母至孝大歴中每為人寫大字獲其錢以供甘㫖瞿令聞善八分古文倒薤藝兼篆籀齊皎髙陽人官至澤州刺史曉音律善大篆工小楷筆蹟雄壯林傑字智周閩川人精琴碁善草𨽻俱自天然不因師授徐璹浩之子㓜勤學善真行書能别識書畫徐峴璹之弟善正書袁滋字德深蔡州人官至兵部尚書强學博記工篆𨽻有古法吳通𤣥海州人與弟通微皆博學善文章並侍太子游德宗立弟兄踵為翰林學士並知制誥通微工行草書翰林習之號院體沈傳師字子言蘇州吳人官至吏部侍郎材行有餘工書有楷法栁子厚河東人少精敏文章卓偉善書家蓄魏晉尺牘甚富臨池訣云栁宗元與劉禹錫得筆法於皇甫閲以宗元為入室禹錫及門宗元自矜其書然亦不甚工裴潾河東聞喜人官至兵部侍郎篤學善𨽻書裴休字公美孟州濟源人官至吏部尚書太子少師能文章善正書體法遒媚休早𨽻於河内後登顯位乃建刹於彼目為化成寺尋授太原節制經由是寺寺僧粉壁陳筆硯候公親題之公神色自若以衣袖揾墨以書之字勢竒絶栁公權字誠懸官至太子少師善正行書初為夏州李聽掌書記穆宗即位入奏事召見謂之曰朕常於佛寺見卿筆蹟思之乆矣即日拜右拾遺充翰林侍書學士遷右補闕司封員外郎穆宗臨朝召問公權筆何盡善對曰用筆在心心正則筆正上改容知其筆諫也公權初學王書遍閲近代筆法體勢勁媚自成一家當時公卿大臣碑版不得公權手筆者人以為不孝外夷入貢皆别署貨貝曰此購栁書文宗夏日與學士聨句帝曰人皆苦炎熱我愛夏日長公權曰薰風自南來殿閣生微涼時丁袁五學士皆屬繼帝獨諷公權兩句曰詞清意足不可多得乃令公權題於殿壁字方圎五寸帝視之嘆曰鍾王復生無以加焉大中初轉少師中謝宣宗召升殿御前書三紙軍容使西門季元捧硯樞宻使崔巨源過筆真書十字曰衛夫人傳筆法於王右軍行書十一字永禪師真書千字文得家法草書八字曰謂語助者焉哉乎也賜錦綵瓶盤等銀器仍令自書謝表不拘真行帝尤竒惜之嘗書京兆西明寺金剛經有鍾王歐虞褚陸諸家法自謂得意栁仲郢字諭䝉公權從子㓜嗜學工草𨽻札節九經三史魏晉已下南北史分門上下凡三十卷號栁氏自備小楷精謹無一字行書當時甚賞其工盧知猷字子謩官至太子太師器度渾厚文詞贍麗工草𨽻有楷法落簡飛翰人争摹倣唐元度官至翰林待詔沔王友善小篆名於一時筆法柔弱無復前人之比而流俗妄稱惜之于僧翰河南人特工八分與貝靈該俱擅名江左靈該効明皇書筆力柔弱畧盡而已僧翰師韓擇木字勢妍美筆畫遒勁兼用篆法然其格律不髙亦自成一家爾周墀字德升汝南人官至尚書右僕射長於史學尤工小篆見稱於一時字畫頗佳傷於柔媚陸希聲博學善屬文工書得其法凡五字擫押鉤格抵用筆雙鉤則㸃畫遒勁而盡其妙謂之撥鐙法希聲自言昔二王皆傳此法自斯翁以至陽氷皆得之希聲以授沙門𧦬光光入長安為翰林供奉引希聲於貴倖昭宗召為給事中後位至宰相僧懐素字藏真長沙人疎放不拘細行頗好筆翰貧無紙可書嘗於故里種芭蕉萬餘株以供揮灑書不足乃漆一盤書之又漆一方板書至再三盤板皆穿吏部尚書韋陟見而賞之曰此沙門札翰當振宇宙大名授筆法於金吾兵曺鄔肜肜嘗謂懐素曰草書古勢多矣惟太宗以獻之書如凌冬枯樹寒寂勁硬不置枝葉張旭長史又嘗私謂肜曰孤蓬自振驚沙怒飛余師而為書故得竒恠凡草聖盡於此懐素不復應對但連呌數十聲曰得之矣顔魯公嘗問師曰夫草書於師授之外師有自得之乎師曰貧道觀夏雲多竒峰輙嘗師之夏雲因風變化乃無常勢又遇壁坼之路一一自然顔公曰噫草聖之淵妙代不絶人可謂聞所未聞之㫖也釋髙閑善草書師懐素深窮體勢韓文公嘗以序送之極稱其善張祜承吉亦有詩云卷軸朝廷餞書函内庫收釋亞栖洛陽人善草書自云其書如飛鳥出林驚蛇入草嘗對御草書兩賜紫袍有詩云通神筆法得𤣥門親入長安謁至尊莫恠出來多意氣草書曽恱聖明君釋貫休蘭溪人善謌詩工草𨽻南土皆比之懐素尤善丹青多畫佛像釋𧦬光善書受撥鐙法於陸希聲自後書法頓長先入長安為翰林供奉希聲猶未逹因寄詩曰筆下龍蛇似有神天池雷雨變逡廵寄言昔日不龜手應念江頭洴澼人𧦬光因引薦希聲於貴倖後至貴顯釋洪堰博學儒釋風姿秀整能講唱詩篇草𨽻皆極精妙時人以其貌義詩書謂之四絶五代楊凝式字景度唐相涉之子有文辭善筆札歴仕梁唐晉三朝佯狂不任事累官至太子少師致仕居洛陽延福坊其書法自顔以入二王之妙洛人得凝式真蹟夸詡以為希世珍西洛寺觀二百餘所題寫㡬遍時人以楊風子呼之羅紹威字端己魏州貴鄉人仕梁累拜太師中書令少好學工書頗知屬文聚書數萬卷開館以延四方之士馬允孫字慶先棣州人少好學事後唐為宰相晉時以太子賔客罷歸洛陽嗜八分書李鶚後唐清泰中仕至國子丞九經印板多其所書當時頗貴重之其筆法盖出歐陽率更然窘於法度而韻不能髙非名書也李從曮茂貞之子善書畫仕後唐襲為鳳翔節度南唐後主李煜字重光善屬文工書畫王師克金陵俘至京師赦之為違命侯煜又能作撮金書自言得筆法於先王然枯勁無可取者韓熈載仕李煜官至中書侍郎才俊氣逸工書畫特善八分皆冠絶當時徐鉉字鼎臣金陵人隨李煜歸朝官至散騎常侍好字學善篆𨽻初學李陽氷後得李斯嶧山碑潛思改作遂逼其勢弟鍇亦能八分小篆而筆法頗少力其在江南皆以文翰知名號二徐為學者所宗郭忠恕字恕先洛陽人七嵗童子及第漢周之際為湘隂公從事工古文小篆八分亦能楷法尤善字學著古文汗簡十卷全倣許氏說文偏旁凡五百四十一字太宗朝官至國子監主簿書小史卷十
