body:
  text: 書小史卷五宋陳思撰傳四晉東晉王導字茂宏琅琊臨沂人官至丞相諡曰文獻公少有風鑒識量清逺善草隸元明二帝並工書者推奬於茂宏王僧虔云導書甚有楷法師學鍾衛好愛無厭喪亂狼狽猶懷鍾尚書宣示帖衣帶過江後在右軍處借王敬仁敬仁死其母見修平生所愛遂以入棺王愔云王導行草見重當世書賦云業盛琅琊茂宏厥初衆能之一乃草其書將以潤色前範遺芳後車風稜載蓄髙利有餘類賈勇之武士等相驚之戲魚王恬字敬豫𨗳之子官至後將軍會稽內史性簡傲多技藝奕棊為中興第一草隸當時無與為比尤長於臨效率性而運則復非工時有張翼善隸書尤善仿效而劣於敬豫也王洽字敬和恬之弟官至中書令理識明敏書兼諸法於草尤工落簡揮毫有郢匠成風之勢雖卓然孤秀未至運用無方從兄右軍云弟書遂不減吾飾之過也王僧虔云洽與右軍書俱變古形不爾至今猶法鍾張王劭字敬倫洽之弟官至車騎將軍善草書王薈字敬文𨗳幼子官至散騎常侍善行書王廙字世將琅琊臨沂人官至平南將軍荆州刺史工草隸飛白祖述張衛遺法亦好索靖之風嘗得索七月二十六日書一紙每寶玩之遭喪亂乃四疊綴於衣中以過江王僧虔云王平南廙是右軍叔自過江東右軍之前惟廙為最畫為晉明帝師書為右軍法其飛白志氣極古垂雕鶚之翅羽類旌旗之卷舒時人云王廙飛白右軍之亞也劉超字世踰琅琊臨邑人官至衛尉零陵忠侯善正書超筆迹與元帝相類自職居近密遂絶其與外交書書賦云體大法殊實推世踰稟天然而自強亂帝札而見拘猶朝廷宿舊年德相趨陶侃字士衡秣陵人官至侍中大將軍事元明二帝性聰敏善正書逺近書疏莫不手答筆翰如流書賦云雍容士衡季孟公旅肌骨間媚精神慢舉如辭山登朝混迹雜處顧榮字彥先吳郡人官至驃騎將軍善草書書賦云彥先尚質無而不有猶崆洞之上世俗誰偶紀瞻字思逺丹陽秣陵人官至車騎將軍好讀書手自抄寫妙解音律善行書卞壼字望之濟隂寃句人官至侍中驃騎大將軍善草書書賦云望之之草緊古而老落紙筋槃分行羽抱如充仞多士交速雜寶應詹字思逺汝南南頓人官至鎮南大將軍幼孝以學藝文章稱善草書書賦云思逺則藁草懸解筆墨無在真率天然忘情罕逮猶羣雀之飛廣厦小魚之戲大海熊逺字孝文豫章人官至大將軍長史善正書書賦云孝文剛斷謹正援毫古雖拙利今稱且高如貴胄之躍駿武賁之操刀郤鑒字道徽髙平金鄉人官至太宰草書卓絶古而且徑書賦云道徽之豐茂宏麗下筆而剛決不滯揮翰墨而厚實深沉等漁父之乘流鼓枻郤愔字方回鑒之子官至司空善衆書張懷瓘云雖齊名庾翼不可同年其法遵於衛氏尤長於章法濃纎得衷意態無窮筋骨亦贍若鴻鵠奮六翮飄然逰乎太虛王僧虔云郤愔章草亞於右軍梁武帝云郤愔書得意甚熟而取妙特難踈散風氣一無雅素郤曇字重煕愔之弟官至北中郎將善草書書賦云密壯竒姿撫迹重煕若投石拔距怒目揚眉郤超字景興愔之子官至中書郎臨海太守善行草書王僧虔云郤超草書亞於二王緊媚過於其父骨力不及也書賦云景興當年曷云世乏正草輕利脫略古法郤儉之字處約曇之子官至太子率更令善草書郤恢字道允儉之之弟官至鎮軍將軍善正行書書賦云處約道允家之後俊狂草勢而兄優謹正書而弟潤俱始登於學次慙一虧於九仭庾亮字元規潁川鄢陵人明穆皇后之兄官至太尉美姿容善談論工行草書王僧虔云庾亮書亦能入録庾懌字叔豫亮之弟官至衛尉將軍善正行書書賦云遺古效鍾叔豫髙蹤雖穩密而傷浮淺猶葉公之愛畫龍庾氷字季堅亮之弟官至中書監以雅素垂風兄亮常以為庾氏之寶善書庾翼字稚恭明穆皇后之弟官至車騎將軍荆州刺史善草隸章草少與羲之齊名殊為世重兄亮亦有書名曾就右軍求書逸少答云稚恭在彼豈復假此王僧虔云庾翼書少時與右軍齊名右軍後進內外宗尚翼猶不忿在荆州與都下書云小兒輩乃賤家雞而愛野雉皆學逸少書須吾還當比之右軍嘗以章草答亮亮以示翼翼乃大服因與右軍書云吾昔有伯英章草十紙因喪亂遺失嘗歎妙迹永絶今見足下答家兄書煥若神明頓還舊觀書賦云積薪之美更覽稚恭名齊逸少墨妙所宗善草則鷹摶隼擊工正則劔鍔刀鋒愧時譽之未盡覺知音而罕逢庾準字彥祖亮之孫官至豫州刺史西中郎將善草書書賦云荒蕪快利彥祖為容似較狡兔於大野任平陂之所從范汪字元平順陽人官至安北將軍贈散騎常侍善正書有謝瓜啓傳於世書賦云順陽筆精吾見元平近瞻元常鍾繇俯視國明張澄利且掩薄能多似生如班翰之運斧之棟梁以經營范寧字武子汪之子官至中書侍郎善正書書賦云武子正筆頗全古質去凡忘情任朴不失猶髙人之與釋子志由道而秉律劉惔字真長沛郡人官至丹陽尹善行草書書賦云真長則草含稚恭庾翼之厚爽正邇越石劉琨之羈束輕浮森峭穠媚藻縟落衆木於秋杪狎羣鷗於水曲孔侃字敬思會稽人官至大司農善行書孔愈字敬康會稽人官至車騎將軍善草書書賦云敬思敬康二孔殊芳思行則輕利峭峻類驚虬逸駿康草則古質鬱紆如落翮摧枯丁潭字世康會稽人官至散騎常侍善正草書書賦云若夫返古不忘吾推世康似無逸少如稟元常猶落太階之蓂莢掇祕府之藝芳孔廞字季舒會稽人官至光祿大夫工書書賦云季舒纎徑循古有禮遇稀難評唯署一啓謝尚字仁祖陳郡陽夏人官至散騎常侍博綜衆藝善草書書賦云謝氏三昆尚草特峻猶注飛澗之瀑溜投全牛之虛創謝安字安石尚之從弟位至太傅和粹通敏姿容溫雅人皆比之王𨗳謂文雅過之學草正於右軍右軍云卿是解書者然知解書為難張懷瓘云安石尤善行書亦猶衛洗馬風流名士海內所瞻王僧虔云謝安亦入能流殊亦自重乃為子敬書嵇中散詩得子敬書有時裂作校紙書譜云謝安素善尺牘而輕子敬之書子敬嘗作佳書與之謂必存録安輒題後答之甚以為恨謝奕字無奕安之兄官至安西將軍善行書書賦云逹士逸迹乃推無奕毫翰云為任興所適謝萬字萬石安之弟官散騎常侍亦工書王珣字元琳洽之子官至給事黃門侍郎善行書王珉字季琰珣之弟官至中書令工𨽻書及行草時謂小王之亞也自𨗳至珉三世善書時人方之杜衛二氏王僧虔云珉筆力過於子敬書舊品云嘗書四匹素自朝操筆至暮便竟首尾如一又無誤字子敬嘗戲云弟書如騎騾駸駸恆欲度驊騮前斯可謂弓善矢良兵利馬疾穿圍破的難與爭鋒書賦云繩繩宜爾傑出季琰露鋒芒而豁懷傍禮樂而無檢猶摶扶搖而坐致超峻極而非險王廞字伯輿即𨗳孫薈子官至司徒左長史善行書書賦云溫溫伯輿亦扇其風風流之表軒冕之中骨體慢正精彩沖融已髙天然恨乏其功如承奕葉之貴胄備風訓之神童王曠羲之父也官至淮南太守善行𨽻書王羲之字逸少琅琊臨沂人官至右軍將軍會稽內史少有美譽善書為古今之冠草隸八分飛白章行備精諸體自成一家之法千變萬化得之神功自非造化發靈豈能登峰造極其所措意皆自然萬象無以加也然剖析張公之草而濃纎折衷乃愧其精熟損益鍾君之隸雖還用增華而古雅不逮至研精體勢則無所不工所謂氷寒於水亦猶雅頌得所鍾鼓云乎羲之隸行草章草飛白五體俱入神品八分入妙有子七人獻之最知名元之凝之徽之操之並工草隸梁武帝評云王羲之書如龍跳天門虎卧鳳閣故厯代寶之永以為訓王元之羲之長子善草書王凝之羲之次子官至左將軍會稽內史工草隸王徽之字子猷凝之弟官至黃門侍郎善正草書王操之字子重徽之弟歷侍中尚書豫章太守善正行草書王渙之徽之弟善行草書王獻之字子敬逸少第七子清峻有美譽尤善草隸兼妙丹青幼學父書次習於張邇後改變制度别創其法率爾師心𡨕合天矩至於行草興合若孤峰四絶逈出天殊其峭峻不可量也子敬七八歲時學書右軍潛從後掣其筆不脫乃嘆曰此兒當有大名遂書樂毅論一篇與之學後題書賜官奴竟能極小真書窮微入聖筋骨緊密不減於父故人謂之小聖官奴即子敬小字也太元中新起太極殿謝安欲使子敬題榜以為萬世寶而難言之乃説韋仲將題凌雲臺事子敬揣知其旨乃正色曰仲將魏之大臣寧有此事使其若此知魏德之不長安遂不之逼也子敬隸行草章草飛白五體俱入神品八分入能品或謂子敬為小令非也子敬為中書令太元十一年卒於官年四十三族弟珉代居之至十三年而卒年三十八時謂子敬為大令珉為小令王濛字仲祖太原晉陽人官至長山令哀靖皇后父也追贈光祿大夫善隸書法於鍾氏狀貌似而筋骨不備衛臻陶侃並其亞也王僧虔云王濛書可比庾翼書賦云奧若太原之英二子間生仲祖慕元常之則懷祖王述通文獻王𨗳之情方言慕而我愧比叔文謝藻而此榮習所通而不及恭放之溫放之而先鳴結束體正肆力專成猶猶棟梁富於合抱乃匠斫而未精王修字敬仁濛之子官至著作郎善隸書嘗求右軍書乃寫東方朔畫像讃與之殆欲窮其妙而未盡其美子敬每省修書云咄咄過人始王𨗳愛鍾氏書喪亂狼狽猶衣帶盛尚書宣示帖過江後以與右軍右軍借敬仁及敬仁亡其母見此書平生所好乃遂與入棺殷仲堪書亦敬仁之亞也王述字懷祖太原人官至中書令藍田使善草書書賦云髙利迅薄連屬欹傾猶鳥避羅而勢側泉激石而分橫王坦之字文度述之子官至侍中中書令善行書王允之字深猷官至衛將軍會稽內史善草行書謝藻字叔文會稽人官至中書侍郎善正書書賦云叔文法鍾纎薄精練用筆雖巧結字未善似漸陸之遵鴻等窺巢之乳燕謝璠伯官至散騎常侍善草書見法帖戴逵字安道譙郡銍人隱居不仕幼有巧慧聰悟博學能鼓琴工書畫總角時以雞子汁溲白瓦屑作鄭玄碑自書刻之文既竒麗書亦妙絶戴顒字仲若逵之子隱遁有髙名亦不仕隱居桐廬父善琴書顒並傳其業李充字宏度江夏鍾武人衛夫人之子纍遷中書侍郎善楷書妙恭鍾索世咸重之李式字景則即充從兄衛夫人之猶子官至侍中善草隸甚佳其叔母善書右軍云李式是平南之流平南將軍王廙也亦可比庾翼弟定子公府能名同式張澄字國明吳郡人官至光祿大夫善正書王僧虔云張澄書當時亦呼有意書賦云國明勵躬鍾氏餘風壯麗纎薄守雌知雄如道門之子仙路時通張彭祖澄之子官至龍驤將軍善隸書張懷瓘云右軍每見彭祖縑素尺牘輒存而玩之夷齊雖賢若仲尼不言未能髙舉亦猶彭祖附青雲之士不泯於世也荀輿字長允潁隂人官至國子助教工隸書章草嘗寫狸骨方一紙右軍見以為絶倫後擬效數十通云此乃天然功弗可及也庾肩吾云荀輿狸骨方學而難逮墨妙至此時人不稱猶伯樂之顧則價增十倍然觀其意趣不先於衛夫人當是右軍中年所賞若暮齒而見應不至歎服也劉召字彥祖彭城人官至御史中丞纍遷侍中善小篆妙工飛白雖不及張宏亦一時之冠也作飛白書勢一篇時有栁詳亦善飛白彥祖之亞也張翼字君祖下邳人官至東海太守尤善草隸劣於王恬時穆帝令翼寫王右軍手表帝自批後右軍殆不能别久乃悟云小人幾欲亂真書賦云君祖馳馭藝忝令譽窮正驗草而罕逮其能作偽亂真而未可為據正企鍾而悠邈草師王而莫著書小史卷五
