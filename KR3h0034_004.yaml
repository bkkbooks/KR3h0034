body:
  text: 書小史卷四宋陳思撰傳魏吳蜀晋魏梁鵠字孟皇安定烏氏人舉孝㢘為郎少好書受學於師宜官以善八分知名靈帝重之亦在鴻都門下遷幽州刺史魏武甚愛其書嘗懸帳中又以釘壁以為勝宜官也庾肩吾云孟皇功盡筆力字入帳中時邯鄲淳亦得次仲法淳宜為小字鵠宜為大字不如鵠之用筆盡其勢也黄初中更脩夫子廟陳思王為文鵠八分書之入妙胡昭字孔明潁川人少而博學老而彌篤有夷皓之節甚能史書真行又妙衛桓云昭與鍾繇並師於劉徳昇俱善行草而胡肥鍾痩尺牘之迹動見模楷羊欣云胡得張芝骨索靖得其肉韋誕得其筋張華云胡昭善隷書華與荀朂共整理記籍又立書博士置弟子教習以鍾胡為法可謂宿士矣嘉平二年卒邯鄲淳字子淑潁川昆陽人官至給事中志行清潔才學通敏書則八體悉工師於曹喜尤精古文大篆八分隷書自杜林衛宏以來古文𣲖絶由淳復著太祖甚敬異之淳博聞古藝特善蒼雅許氏字指八體六書精究其理有名於時以書教諸皇子正始中又書古文篆隷三字石經於漢碑之西其文蔚煥三體復宣校之説文篆𨽻大同而古文小異衛恒云魏初傳古文者出於邯鄲淳蔡邕採斯喜之法為古今雜形然精宻閒理不如淳也梁鵠云淳得次仲法韋誕師淳而不及也袁昂云邯鄲淳書應規入矩方圓乃成韋誕字仲將京兆人官至侍中服膺於張芝兼邯鄲淳之法諸書並善尤精題署明帝時淩雲臺初成誤先釘榜而未題以籠盛誕轆轤長絙引之使就榜書之誕甚危懼乃戒子孫絶此楷書著之家令初青龍中洛陽許鄴三都宫觀始就令詔仲將大為題署以為永制以御給筆墨皆不任用因奏云蔡邕自矜能書兼斯喜之法非流紈綺素不妄下筆夫工欲善其事必先利其器若用張芝筆左伯紙及臣墨兼此三具又得臣手然後可以逞徑丈之勢方寸千言然草迹之妙亞乎索靖梁武帝評云韋誕書如龍威虎振劍拔弩張書賦云魏之仲將奮藻獨歩或迸泉湧溢或錯玉班賦蹟遺情忘契入神悞然而負才異履危懼膏明自煎鬂髪改素生非其代痛惜不遇韋康字元將誕之兄亦工書韋熊字少章誕之子善書時人云名父之子克有工事世所美焉張華云京兆韋誕子熊潁川鍾繇子㑹並善隷書鍾繇字元常潁川長社人才思通敏舉孝㢘為郎厯官侍中尚書僕射封東武亭侯魏國初建遷相國明帝即位遷太傅有脚疾乗輿上殿尤善書師曹喜蔡邕劉徳昇張懐瓘云真書絶妙乃過於師剛柔備焉㸃畫之間多有異趣可謂幽深無際古雅有餘秦漢以來一人而已雖古之善政遺愛結於人心未足多也梁武帝云鍾繇書如雲鵠㳺天羣鳬戲海行聞茂宻實亦難過庾肩吾云鍾繇書天然第一工夫次之妙盡許昌之碑受禪碑也今在許昌窮極鄴下之牘賀魏武破陣表也虞世南云鍾繇師資徳昇馳騖曹蔡傚學而致一體真楷獨得其妍鍾㑹字士季繇之子官至司徒善書有父風稍備筋骨兼美行草尤工𨽻書美姿獨秀逸致飄然有凌雲之志亦所謂劒則干將莫邪焉㑹嘗詐為荀朂書就朂母鍾夫人取寶劒㑹兄弟以千萬造宅未移居朂乃潛畫繇形像於壁㑹兄弟入見感慟便廢宅朂書亦㑹之比也庾肩吾云士季之範元常猶子敬之禀逸少而工拙兼効真草皆成書賦云觀士季之軌轍審鍾家之超越將遺古而皆能與象賢而蹈拙如後生之可畏寔氣盖於前哲衞覬字伯儒河東安邑人官至侍中少夙成以才學稱尤工古文篆隷草體傷瘦筆力絶妙衞恒書勢云魏世傳古文者出於邯鄲淳伯儒嘗寫淳古文尚書還以示淳淳不能别卒諡敬侯張揖字敬仲清河人魏初為博士工楷書有名魏世與韋仲將相善書亦其亞揖嘗著埤蒼廣雅古今字詁綴拾遺漏增長事類抑亦於文為益者也然其字詁方之許篇古今體用或得或失劉廙字嗣恭安陽人官至黃門侍郎妙草書文帝器之命廙通草書杜畿字伯張京兆杜陵人官至尚書僕射子恕字務伯太和中為散騎黄門侍郎出為河東郡太守並善草隷虞松字叔茂㑹稽人官至中書令大司農善草書書賦云名微格髙復見叔茂體裁簡約肌骨豐嫮如空凝斷雲水泛連鷺宋翼鍾繇弟子也翼嘗作書平直相似狀如筭子繇叱之翼三年不敢見繇乃潛心改迹翼初書惡晉太康中有人於洛下破鍾繇墓翼得筆勢論讀之依此法學名遂大振呉皇象字休明廣陵江都人官至侍中工八分篆及章草章草師於杜度先是有張子並陳良甫並稱能書然陳恨瘦張恨峻休明斟酌其閒甚得其妙世謂沈著痛快張懐瓘云右軍隷書以一形而衆相萬字皆别休明章草雖相衆而形一萬字皆同各造其極八分雄逸力乃均於蔡邕而婉冶不逮通議傷於多肉矣書賦云廣陵休明樸質古情難以窮真非可學成似龍蠖啓伸盤復行張紘字子綱廣陵人喜文章善篆書官至侍御史嘗與孔融書自篆融遺子綱書云前勞手筆多為篆書毎舉篇見字欣然獨笑如復睹其人然融之此言不易於得也紘之小篆頗有聲譽張昭字子布彭城人容貎矜嚴有威風為孫權軍師少好學善隷書處士張宏字敬禮呉郡人篤學不仕嘗著烏巾時號張烏巾善篆隷其於飛白絶妙當時飄若逰雲激若驚電飛仙舞鶴之態盖有類焉自作飛白叙勢備其美也歐陽詢曰飛白張烏巾冠世其後逸少子敬亦稱妙絶賀劭字興伯呉興人官至太子太傅善章草書書賦云賀氏興伯同時共體瘦而不疎逸而寡禮等殊皇賀品類兄弟朱育山隂人㑹稽典録云育少好竒字凡所特達皆依體象類造作異字千名以上育後仕朝常在臺閣為東觀令遥拜清河太守加位侍中推刺占射文藝多通蜀諸葛亮字孔明瑯琊陽都人位至丞相其篆隷八分今法帖中有元莫大寂混合隂陽字殊工諸葛瞻字思逺亮之子也官至侍中僕射軍師將軍強識善書畫晉何曾字潁考陳郡陽夏人魏明帝時為黃門郎晉武帝即位官至太保乗輿上殿曾博聞好學工於藁草甚有古質乏於風味亦猶人則抱素木即對冰亦為時所珍荀朂字公曾潁川人在魏為大將軍掾入晉位至尚書令多材藝善書畫鍾㑹嘗詐作朂書取寶劒朂書亦㑹之比也楊肇字季初滎陽宛陵人官至折衝將軍荆州刺史工於草隷咸寧元年卒潘岳誄曰草隷兼善尺牘必珍足無輟行手不釋文翰動若飛紙落如雲亦猶甘茂不能自通借餘光於蘇代安仁之誄抑不其然書賦云季初則隱姓名展纎勁寫搨共傳賞能之盛猶踞牙鉤爪超越䧟穽嵇康字叔夜譙國銍人官至中散大夫竒才不羣美詞氣有風儀雖土木形骸不自藻飾人以為龍章鳯墨若髙逸之士雖在布衣有傲然之色故如臨不測之淵使人神清登萬仞之巖自然意逺所與神交者惟王戎山濤等為竹林七賢唐人評云嵇康書如抱琴半醉詠物緩行又若獨鶴歸林羣烏乍散書賦云叔夜才髙心在幽墳允文允武令望令聞精光照人氣格凌雲力舉巨石芳逾衆芬阮籍字嗣宗陳留尉氏人官至歩兵校尉博覽羣籍尤好莊老嗜酒能嘯善彈琴工行草書阮咸字仲容官至散騎侍郎與叔父籍為竹林之遊妙觧音律善彈琵琶工行草書王戎字濬仲瑯琊臨沂人官至侍中幼頴悟神彩秀朗善𨽻行書山濤字巨源河内懐人武帝時為侍中司徒有器量善正行書書賦云巨源正書樸畧仍餘染翰忘筌寄情得魚若㧞賢草澤匿銳茅廬劉伶字伯倫沛國人官至建威參軍善行草書向秀字子期河内懐人官至散騎常侍清悟有逺識雅好莊老之學善行書見七賢帖衞瓘字伯玉河東安邑人魏侍中覬之子仕魏為尚書郎入晉為尚書令明識清允尤善諸書引索靖為尚書郎號一臺二妙時議謂伯玉放手流便過索而法則不如之嘗云我得伯英之筋恒得其骨索靖得其肉伯玉採張芝法取父書參之遂至神妙天姿特秀若鴻鵠奮翼飄飄乎清風之上率情運用不以為艱章草入妙品衞恒字巨山瓘之仲子官至太子黃門侍郎善古文草隷章草其古文過於父袓體含風雅調合絲桐探異鈎深悠然獨徃博識古今文字得汲冡古文論楚事者最妙恒嘗翫之作四體書勢并造散隷書弟宣善篆及草名亞父兄宣弟庭亦工書恒子璪玠俱有書名家風四世不墜索靖字幼安燉煌龍勒人漢張伯英之離孫官至征西司馬少有出羣之量才藝絶人善章草及草書出於韋誕峻險過之有若山形中裂水勢懸流雪嶺孤松氷河危石其堅勁則古今不逮或云楷法過於衞瓘甚矜其書名其書曰銀鉤蠆尾武帝愛之王隱云索靖草書絶世學者如雲時論云精熟至極索不及張妙有餘姿張不及索袁昂云索靖書如遊飈忽舉鷙鳥乍飛又善八分亦韋鍾之亞也羊祜字叔子㤗山南城人漢蔡邕外孫博學能属文善書仕魏厯中書黃門侍郎武帝受禪以佐命功封鉅平郡公張華字茂先范陽人官至司空壯武公博渉羣書盈於萬卷髙才達識天文術數無所不精善章草書體勢尤古傅元字休奕北地泥陽人官至司隷校尉少孤貧博學善屬文尤精篆隷得鍾胡之法見重當時唐人評云𫝊元書如項羽投戈荆軻執㦸王允字信之官至衞將軍善草𨽻又張嘉善隷書羊欣云嘉師於鍾氏勝王羲之在臨川時也又皇甫定年七歳善史書從兄謐深竒之樂廣字彦輔南陽淯陽人累遷侍中河南尹有逺識喜談論善草書吕忱字伯雍任城人官至義陽王典祠令善書博識古今文字撰字林五篇萬二千八百餘字表上之字林則說文之流小篆亦許慎之亞也杜預字元凱京兆杜陵人漢齊相杜度即六世之祖也祖畿魏尚書僕射父恕幽州刺史並善行草書預博學通敏尚文帝妹官至鎮南將軍特進當陽侯父祖三世善章草書時人以衞瓘方之謂之杜衞二氏焉左思字太冲齊國臨淄人家世儒學少習鍾胡書及鼓琴遂善隷書陸機字士衡呉郡人官至後將軍少有異才善行書呉亡與弟雲俱入洛王僧䖍云陸機呉士書也無以校其多少陸雲字士龍機之弟官至大將軍司馬善行草書張越字仲治燉煌人官至太子舍人梁至刺史善草書張翰字季鷹呉郡人有清才善屬文工草書官至齊王冏大司馬覩天下方亂因秋風起思呉中菰葉蓴菜鱸魚遂命駕而歸人謂之見機書賦云季鷹有聲古貌磅礴雖無名驗攀附張索如凝隂斷雲垂翅一鶚成公綏字子安東郡白馬人累遷中書侍郎博渉經傳有俊才善隷書作隷書體一篇行於世蔡克字子尼陳留考城人官至成都王掾工草書書賦云子尼簡約片月孤峰千嵗之下森森古容劉琨字越石中山人官至太尉善行書書賦云越石偉度粃糠翰墨如不伐樹而愛人示問鼎而在徳盧諶字子諒范陽涿人為劉琨司空從事中郎琨敗為石季龍所得為侍中中書監善正書并草與崔悅齊名諶法鍾繇悅法衞瓘而俱習索靖之草皆盡其妙子偃孫邈並有書名辛謐字叔重隴西狄道人少有志尚博學善屬文工草隷書為時楷法召拜太子舍人諸王文學累徵不起永嘉末長安䧟沒於劉聰江瓊字孟琚仕晉為馮翊太守善蟲篆訓詁受學於衞覬永嘉亂棄官西投張軌子孫因居凉土世傳家業偽趙劉聦字元明元海之子幼聦慧好學善屬文工草隷劉曜字永明元海族子幼聪慧善屬文工草隷書小史卷四
