body:
  text: 書小史卷七宋陳思撰傳六梁陳梁蕭子雲字景喬晉陵人齊豫章王嶷第九子官至侍中少善書小篆草行諸體兼備張懷瓘云特妙飛白意趣飄然點畫之際有若鶱舉妍妙至精難與比肩但少乏古風抑居妙品歐陽詢云蕭侍中飛白輕濃得中如蟬翼掩素遊霧崩雲可得而語其真書少學子敬晚師元常得其體勢雖少乏力及其暮年筋骨亦備名蓋當世舉朝效之梁髙祖雅重其書常論子雲書曰筆力徑駿心手相應巧踰杜度美過崔實當與元常並驅爭先其見賞如此子雲出為東陽太守百濟國使人至建業求書逢子雲為郡維舟將發使人於渚次候之望船拜行前子雲遣問之答曰侍中尺牘之美逺流海外今日所求惟在名迹子雲乃為停船三日書三十紙與之獲金貨數百萬書賦云景喬則潤色鍾門性情勵已豐媚輕巧纎曼旖旎詩雖易其國風賜豈賢於夫子猶鸞窺鏡而鼓翼虎不嘻而履尾蕭特字世達子雲之子官至太子舍人海鹽令善草𨽻時人比之衛恆衛瓘武帝嘗使特書及奏帝曰子敬之迹不及逸少蕭特之書遂逼於父蕭幾字德元齊曲江公遙欣之子年十嵗能屬文性溫和與物無競清貧自立好學善草𨽻書纍遷新安太守蕭確字仲正邵陵王綸之子官至廣州刺史永安侯有文才善行草尤工正書公家碑碣一皆使之初除祕書丞武帝曰為汝能文故有此授書賦云仲正則寬而壯賖而密婆娑蹣跚綽約文質稟庭訓而微過任天然而自逸若衆山之連峰探仙洞而不一王彬字思文志之弟好文章習篆𨽻與志齊名時人為之語曰三真六草為天下寶尚齊髙帝女臨海長公主拜駙馬都尉天監中歷吏部尚書祕書監梁武帝云王彬放縱快利筆道流便王籍字文海僧祐之子好學有才氣官至佐唐侯相甚工草書筆勢遒放蓋孔琳之流亞也書賦云文海緊快勢逸氣髙未忘俗格鋭意操刀猶樂成名於朝野嗤遁迹於蓬蒿陸杲字明霞吳郡人官至光祿大夫揚州大中正好辭學工書畫其舅張融有髙名杲風韻舉止頗類時稱曰無對日下惟舅與甥書賦云陸杲迅熟騁捷遺能任縱便無風稜如郊坰羽獵䎀狨奔騰陶𢎞景字通明丹陽秣陵人官至諸王府侍讀永明中辭祿遂止句曲山自號華陽隱居好著述明衆藝善書師祖鍾王采其氣骨雜以楊許之法然真書體勢歐虞往往得之嘗答梁武帝論書啓云愚固博涉患未能精苦恨無書願作主書吏晚愛楷𨽻又羡典掌之人言人生數紀之內識解不能周流天壤區區惟恣五欲實可愧耻每云得作才鬼猶勝頑仙武帝嘗欲徵用隱居畫二牛一以金龍頭牽之一則逶迤就水草梁武知其意不以官爵逼之朝廷有事多詢之號山中宰相書賦云通明髙爽緊密自然擺闔宋文峻削阮研載窺逸軌不讓真仙猶龍髯鶴頸奮舉雲天阮研字文幾陳留人官至交州刺史善書其行草出於逸少精熟尤甚其勢若飛泉交注奔競不息張懷瓘云文幾與子雲齊名時稱蕭阮等各得右軍一體而此公筋力最優比之於勇則被堅執鋭所向無前論之於談則緩頰朵頥離堅合異有李信王離之攻取無子貢魯連之變通可謂力過宏景雄蓋子雲其𨽻則習於鍾公風致稍怯庾肩吾云阮研居今觀古盡窺衆妙之門雖師王祖鍾終成别搆一法亦有得矣書賦云文磯纎潤穩正利草軟媚橫流姿容媚好若其抑阮褒殷庶幾同塵似泉激溜於懸磴木垂條於晚春王僧孺字僧孺東海郯人官至北中郎咨議參軍幼聰慧及長篤愛墳籍工屬文善楷𨽻聚書至萬卷率多異本沈約字休文吳興武康人官至尚書令太子少傅博通典籍善屬文工草書見法帖栁惲字文暢官至吳興太守好學善尺牘能鼓琴特窮其妙梁武帝云栁惲書縱橫廓落大意不凡而德體未備任昉字彥升樂安人官至吏部郎掌著作善草書家藏書萬卷書賦云體雜間利覩夫彥升搆牽掣而無法任胸懷而足慿猶注懸泉咽凝氷殷鈞字季和陳郡長平人好學有思理善𨽻書為當世楷法尤工行草南郡范雲樂安任昉並稱美之起家祕書郎鈞在職校定祕閣四部書更為目録又受詔科檢西省法書古迹别為品目官至國子祭酒書賦云季和慢速風規所屬圓轉頗通骨氣未足蕭賁字文煥竟陵王孫也官至河東太守幼好學有文才能書畫嘗於扇上圗山水咫尺之間便覺萬里為遙矜慎不傳自娛而已傅昭字茂逺北地人官至祕書監善草書書賦云茂逺捷鋭足以自給彥和連環迅不可及如過雨之奔簷霤飛燎之赫原隰朱異字彥和吳郡人居貧以傭書自業寫畢便誦涉獵文史通雜藝博奕書算尤善草書陸倕字佐公吳郡人慧曉之子官至太常卿少勤學能屬文善行草書庾詵字彥寶新野人幼聰悟武帝詔以為黃門侍郎不起篤學經史百家無不該綜書射棊算並一時之絶丁覘洪亭人頗善屬文殊工草𨽻顔氏家訓云孝元在荆州書記一皆委之軍府輕賤多未之重耻令子弟以為楷法云丁君十紙不敵王褒數字吾雅愛其手迹嘗所寶持孝元嘗遣典簽惠編送文章示蕭祭酒問云君王比賜書翰及寫詩筆殊為佳手姓名為誰都無聲問編以實答子雲歎曰此人後生無比遂不為世所稱亦是竒事於是聞者少復刮目稍仕尚書儀曺郎後為晉安王侍讀隨王東下及西臺陷沒簡牘湮散丁尋殁於揚州前所輕者後思一紙不可復得到沆字茂瀣齊御史中丞撝之子官至北中郎咨議參軍美風神容止可觀善屬文工篆𨽻袁昻字千里陳郡陽夏人仕齊為祕書監黃門侍郎入梁官至中書監幼以孝稱善書畫嘗著書評一卷劉慧斐字宣文彭城人少博學能屬文起家安成王法曺參軍後不仕與處士張孝秀居東林寺相得甚歡尤明釋典工篆𨽻在山手寫經二千餘卷張孝秀字文逸南陽宛人為建安王别駕頃之遂去職歸廬山居東林寺性通率不好浮華博涉羣書專精釋典善談論攻𨽻書凡諸藝能莫不明習孔敬通官至東宫學士能一筆草書一行不斷婉約風流特出天性頃來莫有繼者又創為左右書當時座上酬答無有識者庾元威見而喜之遂呼為衆中清間法庾元威字少明善蟲篆及雜體書作書論一篇行於世徐僧權東海人官至梁東宫通事舍人領祕書以善書知名劉孝綽字孝綽齊司馬從事中郎繪之子幼聰敏七嵗能屬文號為神童歷官祕書監善草𨽻自以書迹似父乃變為别體范懷約吳郡人官至東宫侍書善正行書梁武帝云范懷約真書有力而草行無功故知簡牘非易書賦云蠢蠢懷約任已作制若孤陋儒生辛勤一藝江蒨字彥標濟陽考城人官至光祿大夫善行書書賦云彥標氣懦任力或滯猶翮短風髙升沉靡制江祿字彥遐蒨之弟幼篤學有文章工書善琴位至太子洗馬湘東王録事參軍徐伯珍字文楚東陽人少孤貧學書無紙嘗以竹箭箬葉甘蕉及地上學書遂工楷𨽻顔協字子和琅琊臨沂人為湘東王記室少博涉羣書工草𨽻飛白吳人范懷約能𨽻書協學其書殆過真也荆楚碑碣皆協所書時有會稽謝善勛能為八體六文方寸千言京兆韋仲善飛白並在湘東王府善勛為録事參軍仲為中兵參軍府中以協優於韋仲而減於善勛庾肩吾字慎之新野人官至度支尚書才華並秀草𨽻兼善張懷瓘云歷記專精遍採名法亦可謂贍聞之士也然志雖竒古而手不副情文勝質史是之謂乎自號玄靜先生撰書品論一卷書賦云肩吾通塞併之天性工歸文華拙見草正徒聞師阮何至遼敻使鉛刀之均鋒稱並利而則佞陳顧野王字希馮吳郡吳人官至黃門侍郎領大著作幼好學長而遍覽經史精記默識天文地理蓍龜占候蟲篆竒字無所不通尤善丹青時王褒能書俱為宣城王賓友人號二絶書賦云接武隨波雷同野王如異磽肥之挺質俱松柏之凌霜徐陵字孝穆東海人官至左光祿大夫太子少傅善正書書賦云孝穆鄙重剛毅任拙猶偏禆武夫膽勇智劣趙知禮字齊旦天水隴西人官至右衛將軍涉獵文史善書翰工楷𨽻張正見字見賾清河東武城人幼好學有清才善行草書仕梁為彭澤令入陳遷尚書度支郎謝貞字元正幼有至性年十三善左氏工草𨽻蟲篆後為南平王友掌書記周宏讓汝南人天嘉初為太常卿光祿大夫善草𨽻書賦云宏讓迅快放誕可觀利疾速著輕狷若巖居僻陋蔓木樛盤王克琅琊人官至尚書僕射善草書書賦云名劣筆健乃逢王克通流未精疏快不忒猶腐儒宿士運用自得蔡景歷字茂世濟陽考城人官至度支尚書少俊爽有孝行家貧好學善尺牘工草𨽻蔡徵字希祥景歷之子官至中書令善草書書賦云翩翩濟陽茂世希祥任朴無聞適俗不忘父輕而迅子凛而強孫㻛字德璉吳郡人官至起部尚書少倜儻好謀略博涉經史尤便書翰毛喜字伯武滎陽陽武人官至光祿大夫領右驍衛將軍少好學善草𨽻陳武帝素知之書賦云快哉伯武心空手敏古風若遺令範惟允如平郊逸驥晚景飛隼蕭乾字思惕蘭陵人官至五兵尚書容止雅正性恬簡善草𨽻得叔父子雲之法蕭引字升休官至正威將軍性聰敏博學能屬文善𨽻書為當時所重宣帝嘗披奏事指引署名曰此字筆勢翩翩似鳥之欲飛引謝曰此乃陛下假其毛羽耳又謂引曰我有所忿見卿輒意解何也引曰此自陛下不遷怒臣何預此恩江總字總持濟陽人官至尚書令善草書書賦云坡陀總持獨步方外甘率性而衆異非接武於興會若時違隱淪卒不冠帶沈君理字仲倫吳興人官至侍中尚書右僕射善草書書賦云仲倫則快速無度馳突不疏尺題已終筆勢仍餘似逸籠檻之衆鳥恣飛鳴之所如蔡凝字子居濟陽考城人官至信威晉熙王府長史幼聰悟美容止既長博涉經傳有文詞尤工草𨽻丁真善正書宣帝於太極殿內作鼎刻忠臣烈士名詔真書之謝嘏字含茂陳郡人官至侍中中書令風神清雅頗善屬文尤工行草書賦云含茂悠悠荐臻同德迫時季而陵替俱道喪於翰墨徒麋鹿為後先非勝負可差忒袁憲字德章陳郡人官至右僕射善草書書賦云德章率爾流浪急速骨氣乍髙風神入俗符縱志而失道等潰河與顛木賀朗會稽人官至祕書監善行書書賦云賀氏曰朗雖非動人不事筆力猶阻學貧若宦遊旅泊衣化風塵伏知道昌平人官至鎮北長史善草書書賦云知道則寬疏弛慢無可取則削凡常病窒塞猶岸陸縱獺艱辛騁力侯安都字成師始興曲江人官至侍中征北將軍涉獵書傳工𨽻書善騎射劉顗好文學工草書為司空功曺待詔文林館書小史卷七
