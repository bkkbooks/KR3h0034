body:
  text: 書小史卷九宋陳思撰傳八唐唐房𤣥齡字喬齊州臨淄人隋司𨽻彦謙之子官至司空文昭公㓜警敏貫綜墳籍善屬文書兼草𨽻後圖形凌烟閣讃云才兼翰藻思入機神書賦云房文昭則雅而和隱乃訛精神乏氣胷臆餘波若蘋萍無品共泛中河歐陽詢字信本潭州臨湘人歴太子率更令㓜孤陳中書令江總收養之教以書記聰悟絶人博覽古今書則八體盡能筆力勁險尤妙古篆髙麗愛其書遣使請焉神堯嘆曰不意詢之書名逺播夷狄嘗行見索靖所書碑觀之去數步復返及疲乃布坐至宿其傍三日乃得去其所嗜類此張懐瓘云詢飛白冠絶峻於古人有龍蛇戰鬬之象雲霧輕濃之勢風旋雷激操舉若神真行出於大令森森焉若武庫矛㦸風神嚴於智永潤色寡於虞世南其草書跌宕通流示之二王可為動色然驚竒跳駿不避危嶮傷於清雅之致自羊薄之後略無勍敵歐陽通詢之子也累官殿中監蚤孤母徐教以父書懼其惰嘗遺錢使市父遺迹通乃刻意臨倣以求售數年書亞於詢父子齊名號大小歐陽體通晚自矜重以狸毛為筆覆以兎毫管皆犀象非是未嘗書書賦云學有大小夏侯書有大小歐陽父掌邦禮子居廟堂隨運變化為龍為光虞世南字伯施㑹稽餘姚人官至秘書監永興公性沉靜寡欲博達古今善正行草書出於大令太宗毎稱其五絶一曰德行二曰忠直三曰博學四曰文詞五曰書翰世南始學書於浮屠智永逺究其法為世秘愛張懐瓘云其書得大令之宏規合五方之正色姿榮秀出智勇存焉絶頂危峰處處間起行草之際尤所偏工及其暮齒加以遒逸書賦云永興超出下筆如神不落疎慢無慙世珍然則比文幾阮研而老成與貞白陶𢎞景而德鄰如層臺緩步髙謝風塵虞纂世南族子書翰甚工有叔父體則而風骨不逮虞焕世南之孫善書竇臮云子纂孫煥皆能繼世煥授武官在仗宿衛初隋有猛將來䕶兒子恒濟皆負才學入唐繼登三事故陸元方云來䕶兒兒把筆虞世南男帶刀言物極則反一至於此書賦云纂煥嗣聖體多拘檢如彼碔砆亂其琬琰褚遂良字登善杭州錢唐人官至右僕射河南公博涉文史工𨽻楷書太宗嘗歎曰虞世南死無與論書者魏徵白見遂良帝令侍書帝方博購王羲之故帖天下争獻然莫能質其真偽遂良獨論所出無舛冐者嘗問虞世南曰吾書何如智永答曰吾聞彼一字直五萬君豈得此曰孰與歐陽詢曰吾聞詢不擇紙筆皆得如志君豈得此遂良曰然則何如世南曰君若手和筆調固可貴尚遂良大喜張懐瓘云遂良少則服膺虞監長則祖述右軍真書甚得媚趣若瑶臺青瑣窅映春林美人婵娟似不任乎羅綺鉛華綽約甚有餘態遂良亦嘗師受史陵然史亦有髙古傷於疎瘦書賦云河南專精克儉克勤伏膺告誓銳思猗文恐無成於畫虎將有類於效顰曹憲揚州江都人官至秘書學士精諸古字於小學家尤邃自漢杜林衛宏以後古文冺絶至憲此學復興撰桂苑珠叢一百二十卷體製擬顧野王玉篇以小篆八分𨽻書三體正御本甚精顔師古字籀京兆萬年人官至秘書監𢎞文館學士少博學精訓詁學善屬文多藏古圗畫器物書帖性所篤愛古篇竒字世所惑者討析申論必暢本源顔勤禮字敬官至著作郎㓜而朗悟識量宏逺工於篆籀尤精詁訓秘閣司經史籍多所刋定與兄師古相峙俱以文學為崇賢𢎞文館學士太宗使蕭鈞贊曰依仁服義懐文守一履道自居下帷終日德彰梓里行成蘭室鶴鑰馳稱龍樓委質顔昭甫字周卿勤禮之子少聰頴工篆籀草𨽻書與内弟殷仲容齊名而勁利過之特為伯父師古所賞凡所注釋必令叅定為天皇曹王侍讀曹王屬有獻古鼎篆書二十餘字舉朝莫能讀昭甫盡能讀之劉仁軌字正則陳留尉氏人位至尚書左僕射工正行書少好學值隋末喪亂不遑專習每行坐書空畫地遂有能名陸柬之吳郡人虞世南之甥也官至太子司議郎善正行草書李嗣真云柬之學虞草體用筆則青出於藍故非子雲之徒正𨽻工夫恨少不致髙絶也張懐瓘云柬之少師世南臨寫所合亦猶張翼換羲之表奏蔡邕為平子後身晚習二王尤尚其古中年之迹猶有怯懦總章以後乃備筋骨殊矜質樸耻夫􅊏靡故欲暴露瑕疵雖為時鄙囬也不愚尤善運筆至於興㑹則窮理造微然工於倣效劣於獨斷以此為少也楊師道字景猷華隂人官至侍中中書令清警有才思善草𨽻工詩上官儀字游韶陜人官至西臺侍郎工文詞涉貫墳典善書張懐瓘云楊師道上官儀劉伯莊並師法虞公過於纂矣殷開山名嶠以字行京兆鄠人官至吏部尚書鄖國公開山涉書工為尺牘竇苹云尺牘書題也見前漢陳遵傳李懐琳洛陽人工臨寫善草𨽻好為偽迹嘗效王書大急就兩本各十紙言詞鄙下而䟦尾分明徐唐沈范蹤跡烜赫勞茹裝背持以質錢貞觀中勑頻搜求彼之錢主持以詣闕太宗殊喜賜縑二百疋懐琳乃上别本因得待詔文林館書賦云爰有懐琳厥迹疎壯假他人之姓氏作自己之形狀髙風甚少俗態猶多吠聲之軰或浸餘波薛純陀太宗時官至秘書其書有筆法遒勁精悍不减歐陽詢張懐瓘云薛純陀學歐陽詢草書傷於肥鈍亦通之亞也孫過庭字䖍禮吳郡人官至率府録事博通今古獨秀文華善正行草書張懐瓘云草書憲章二王用筆雋㧞尚異好竒凌越險阻功用雖少而天材有餘真行之書亞於草矣嘗作運筆論甚得書趣與王知敬友善王則過於遲緩孫亦傷於急速使夫二子寛猛相濟是為合矣書賦云䖍禮凡草閭閻之風千紙一類一字萬同如見疑於氷冷甘没齒於夏蟲錢毅善小篆飛白風流敏麗太宗甚賞其能薛稷字嗣通河東人官至太子少保善書初貞觀永徽間虞世南褚遂良以書專家後莫能繼稷外祖魏徵家多藏虞褚書故銳精臨倣結體遒麗遂以書名天下畫又絶品睿宗在藩喜之張懐瓘云師學褚公尤尚綺麗媚好膚肉得師之半可謂河南公之髙足當時無及之者甚為時所珍尚書賦云少保師褚菁華却倍超鼫鼠之效能愧隋珠之掩纇魏叔瑜字思瑾鄭公之子善草𨽻書嘗以筆意傳其子華及甥薛稷魏華字茂實叔瑜之子官至太子左庶子世業清素尤好書翰初與薛稷俱師於褚後習右軍行草其迹遂過於師世稱善書者前有虞褚後有薛魏裴行儉字守約絳州聞喜人官至禮部尚書工草𨽻行書及章草髙宗嘗以絹素令寫文選一部覽之秘愛其法賚物良厚嘗謂人曰褚遂良非精筆佳墨未嘗輙書不擇筆墨而研㨗者惟予與虞世南耳所撰草字雜體數萬言傳於世姜協字夀秦州上邽人善篆籀歴燕然都䕶夏州都督封成紀縣侯謚曰威殷令民陳郡人善正書與其子仲容皆以能書擅名一時而令民筆法精妙不减歐虞殷仲容令民之子官至禮部郎中善正書尤精題署武后嘗詔仲容題資聖寺額王知敬題清禪寺額當時謂之雙絶書賦云殷公王公兼正兼署大乃有則小非無據麒麟將騰鸞鳳欲翥題二榜而迹在歎百川而身去王知敬懐州河内人官至太子家令工草行及章草尤善題署李嗣真云房僕射𤣥齡雕文抱質王家令碎玉殘金房如海上雙鵷王比雲間孤鶴王知慎知敬之弟官至少府監工書善畵與兄知敬齊名張彦逺名畫録云長安靈苑寺西廊北院有趙武端畫浄土變相知慎書甚有功宋令文虢州𢎞農人有勇力工書畫善屬文髙宗時為驍衛將軍東臺詳學正士世稱令文三絶書畫力也張懐瓘云令文尤好於書備兼諸體偏意在草志欲究能力用雖殷筋骨終寡亦得書之媚趣公有三子之問以文詞知名之悌有勇力之愻精草𨽻世謂皆得父一絶王紹宗字承烈廣陵江都人官至秘書少監少貧困嗜學工草𨽻客居僧房寫書取庸自給張懐瓘云紹宗清鑒逺識才髙出羣書則祖述子敬欽羡柬之其草則攻乎異端度越繩墨其正行與章草則體象尤異沈邃堅宻然華不逮陸而古乃齊之嘗與人書曰鄙夫書翰無功者特由水墨之積習耳當精心率意虛神靜思以取之吴中陸大夫常以余比虞君以不臨寫故也聞虞被中畫腹與余正同虞即世南也兄嗣宗亦善書師陸柬之甚有骨氣而性矛盾書賦云王秘監則首末全貞尊道重德或終紙而結字或重模而足遵句反墨濩落風規雄壯氣力播清譽而祖述屢見賞於有識如曲浦鴻飛芳園桂植髙正臣廣平人官至衛尉少卿善正行草書習右軍之法次之甲乙脂肉頗多骨氣微少睿宗甚愛其書張懐瓘云先君張紹光强仕之年與髙有舊朝士就髙乞書或􅑀先君書之髙嘗為人書五十紙先君􅀈換五紙又令示髙髙竟不辨客曰有人换公書髙笑曰必是張公也乃審詳之得三紙客曰猶有在髙熟視之終不能辨陸柬之嘗為髙書告身髙常嫌之不將入帙後為鼠傷乃謂先君曰此鼠甚解正臣意其風調不合乃爾李思訓唐宗室也官至右武衛大將軍彭城公早以藝稱髙宗甚重之畫山水得名亦能𨽻筆李北海邕為其碑云思訓畫工神於鄭陸墨妙聖於鍾張鍾紹京䖍州贛人魏太尉繇十五代孫以善書直鳳閣武后時署諸宫殿明堂及銘九鼎皆其筆也尤善草𨽻當時呼為小鍾其字畫妍媚遒勁有法石泉公王方慶素尚毫翰毎還私第必請紹京盛論法書方慶嘗疾湏紹京言書輙差右相楊再思以為鍾君可愈王侍郎疾也張昌宗搜訪天下圖書以紹京妙識古今奏請直秘書寳匣竒蹟莫不徧覽明皇在藩邸愛重其書及即位拜户部尚書太子詹事紹京嗜書畫如王羲之獻之褚遂良真迹家藏至數十百卷賈膺福官至太子中舎人善八分筆法精妙可喜按舊唐史云武后鑄九鼎圖寫山川物象命工書人賈膺福薛昌容李元振鍾紹京等分題之顔元孫字聿修昭甫之子少孤養於舅殷仲容家尤善草𨽻仲容以能書為天下所宗人造請者牋盈几輙令代遣得者欣然莫之能辨𤣥宗出諸家書迹數十卷曰聞公能書可為定其真偽公分别以進𤣥宗大恱賜箋籐筆墨衣服等物著干禄字書行於世顔惟貞字叔堅元孫之弟官至太子文學薛王友仁孝友悌少孤育舅殷仲容氏蒙教筆法家貧無紙筆與兄以黄土掃壁木石畫而習之故特以草𨽻擅名杜審言字必簡襄陽人官至國子監主簿修文館直學士性滑稽雅善五言詩工草𨽻嘗謂人曰吾文章當得屈宋作衙官吾筆當得王羲之北面其矜誕類此盧藏用字子潛幽州范陽人官至黄門侍郎才貌清雅工草𨽻大小篆八分善琴奕張懐瓘云㓜尚孫薛晚師右軍雖闕於功績嫻於體艶八分之製頗傷疎怯呂摠云盧藏用八分如露潤花妍煙凝修竹魏哲善章草及應命而作略無疑滯功夫越於子潛而氣魄不逮也張旭蘇州吴人官至右率府長史善草書自言吾見公主擔夫争路而得其意又觀公孫氏舞劍器而得其神性嗜酒每飲醉輙草書揮筆大呌或以頭揾墨中而書既醒自視以為神異不可復得世呼為張顛嘗私謂鄔肜曰孤蓬自振驚沙怒飛予師而為書故得竒怪凡草聖盡於此矣初仕為常熟尉有老人陳牒求判宿昔又求旭怒其煩責之老人曰觀公筆迹竒妙欲以藏家耳旭因問所藏盡出其父書旭視之天下奇筆也自是盡其法旭以善草得名亦甚能小楷盖虞褚之流也書賦云張長史則酒酣不覊逸軌神澄回眸而壁無全粉揮毫而氣有餘興若遺能於學知遂獨荷其顛稱司馬承禎字子微洛州温人隱天台華峯號白雲先生開元中召至京師勅於王屋山置壇室以居善篆籀帝命以三體寫老子刋正文句著坐忘論八篇年八十九卒諡貞一先生賀知章字季真㑹稽人官至秘書監自號四明狂客善草𨽻嘗與張旭游於人間凡人家㕔館好墻壁及屏幛忽忘機興發筆落數行如蟲豸飛走雖古之張索不如也好事者具筆硯從之意有所愜不復拒然每紙纔十數字世傳以為寳天寳初請為道士還鄉里詔許之以宅為千秋觀仍賜剡川鏡湖一曲宋儋字藏諸廣平人髙尚不仕户部侍郎宇文融薦授秘書省校書郎善書作鍾體而側戾放縱迹不副名開元末舉塲中後軰多師之吕摠云宋儋書如暮春花發夏栁枝低李璆隴西人性疎達輕財重諾善書筆路𦂳媚亦有聲於代書賦云宋儋李璆擅美中州李師王而意淺宋祖鍾而體便吴道元陽翟人官至寧王友工書善畫好酒使氣毎欲揮毫必湏酣飲學書於張長史旭賀監知章其迹似薛少保亦甚便利初名道子𤣥宗改名道元張懐瓘云吳生之畫筆下有神是張僧繇後身也鄭䖍鄭州滎陽人官至著作郎善圖山水好書常苦無紙知慈㤙寺有柿葉數屋遂借僧房居之日取葉學書嵗乆殆遍𤣥宗愛其材為置廣文館以䖍為博士嘗自寫其詩并畫以獻帝大署其尾曰鄭䖍三絶吕摠云鄭䖍書如風送雲收霞催月上盧鴻字顥然其先范陽人隱於嵩山博學善篆籕及楷𨽻開元初備禮徵至東都拜諫議大夫固辭還山廣學廬聚徒至五百人陸堅洛陽人初名友悌𤣥宗嘉其剛正更賜名堅官至秘書監善書帝待之甚厚圖形禁中親製贊李巖趙州髙邑人歴官兵部侍郎善草𨽻吕向字子回涇州人少孤託外祖母隱陸渾山工草𨽻能一筆環寫百字若縈髪然世號連綿書官至工部侍郎文詞學業當代莫比書賦云吕公歐鍾相雜自是一調雖則筋骨乾枯終是精神嶮峭其於小楷尤更巧妙梁昇卿善小篆八分吕摠云梁昇卿八分如驚波徃來巨石前却郭謙光官至國子監丞善八分初不見稱於唐人獨歐陽公修盛稱其字畫筆法不减韓蔡史李四家韓擇木昌黎人官至工部尚書右散騎常侍工八分書師蔡邕法風流閒媚為伯喈中興書賦云韓常侍則八分中興伯喈如在光和之美古今迭代昭刻石而成名類神都之冠葢李邕字泰和揚州江都人官至北海太守善行書以文名天下時稱李北海盧藏用嘗謂邕如干將莫邪難與争鋒翰林美事云李北海文章書翰公直詞辨義烈英邁皆一時之傑夫人之藝術多不兼稱至於王逸少以書掩其文李淳風以術映其學如公之藝六事咸絶古今罕儔呂摠云李邕書如華岳三峯黄河一曲書小史卷九
